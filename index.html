<script>
var SUPABASE_URL = 'https://ucwsinzfpvjzdeqncjqc.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjd3NpbnpmcHZqemRlcW5janFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNzAzODUsImV4cCI6MjA4OTc0NjM4NX0.CncnodPpTasZlOaw4ueZDyM4lSdxkOe51PkJ1DtHOZY';
var ADMIN_PASSWORD = '1111';
var LEAGUE_ID = 1406714;
var PLAYER_MAP = {
  "lai's_dream": 3818341, "Legend Son": 879948, "\u53d2cap\u649a\u932f\u4eba": 10037,
  "\u9054\u86c7\u7684\u6700\u5f8c\u63a2\u6208": 901186, "\u548c\u6ce2\u7167YEAH\uff01": 1394163,
  "Arne slot lalalalala": 3775889, "\u5229\u8a18\u6d77\u9bae": 5281742, "\u4f86\u90fd\u4f86\u4e86": 6297083
};
var PLAYER_ORDER = Object.keys(PLAYER_MAP);
var PLAYER_COLORS = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#ff7b72','#ffa657','#79c0ff','#56d364'];
var CHIP_TC_KEYS = ['triple_captain', '3xc'];
var CHIP_DISPLAY = {
  'triple_captain': '\ud83d\udc51 TC', '3xc': '\ud83d\udc51 TC',
  'bboost': '\ud83d\ude80 BB', 'wildcard': '\ud83d\udd04 WC', 'freehit': '\ud83c\udd93 FH'
};

var allResults = [], allCapLog = [], latestGW = null;
var currentGW = null;
var autoRefreshTimer = null, refreshCountdown = 300;
var modalChart = null, currentModalPlayer = null, currentModalTab = 'penalty';
var elementData = {};
var currentSort = { key: 'cumul_net_points', dir: 'desc' };
var squadCache = {};

async function supabaseGet(table, query) {
  if (!query) query = '';
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + table + query, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  return res.json();
}

async function supabaseUpsert(table, data) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?on_conflict=gw,entry_id', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) { var err = await res.text(); throw new Error('Supabase \u5beb\u5165\u5931\u6557\uff1a' + err); }
  return true;
}

async function fetchFPL(path) {
  var res = await fetch(
    'https://ucwsinzfpvjzdeqncjqc.supabase.co/functions/v1/bright-processor?path=' + encodeURIComponent(path),
    { headers: { 'Authorization': 'Bearer ' + SUPABASE_KEY } }
  );
  return JSON.parse(await res.text());
}

async function loadData() {
  allResults = await supabaseGet('weekly_results', '?order=gw.asc');
  allCapLog = await supabaseGet('cap_log', '?order=gw.asc');
  if (!Array.isArray(allResults)) allResults = [];
  if (!Array.isArray(allCapLog)) allCapLog = [];

  var gwSet = {}; allResults.forEach(function(r){ gwSet[r.gw] = 1; });
  var gws = Object.keys(gwSet).map(Number).sort(function(a,b){ return a-b; });

  if (gws.length > 0) {
    latestGW = gws[gws.length - 1];
    if (!currentGW) currentGW = latestGW;
    var sel = document.getElementById('gw-select');
    sel.innerHTML = '<option value="">-- \u63c0 GW --</option>' + gws.map(function(g){ return '<option value="'+g+'" '+(g === currentGW ? 'selected' : '')+'>GW'+g+'</option>'; }).join('');
    document.getElementById('gw-bar').style.display = 'flex';
    var latest = allResults.reduce(function(a,b){return a.updated_at > b.updated_at ? a : b}, allResults[0]);
    document.getElementById('last-updated').textContent = '\u66f4\u65b0\uff1a' + new Date(latest.updated_at).toLocaleTimeString('zh-HK');
  } else {
    document.getElementById('last-updated').textContent = '\u672a\u6709\u6578\u64da';
  }

  try {
    var boot = await fetchFPL('bootstrap-static/');
    var teamCodeMap = {};
    (boot.teams || []).forEach(function(t){ teamCodeMap[t.id] = t.code; });
    (boot.elements || []).forEach(function(el){
      elementData[el.id] = { name: el.web_name, pos: el.element_type, teamCode: teamCodeMap[el.team] || 0 };
    });
  } catch(e) {}

  renderWeekly(currentGW || latestGW);
  renderSummaryTable();
  renderCaptainTable();
  renderLastPlaceTable();
  renderWorstGWTable();
  startAutoRefresh();
  preloadSquads(currentGW || latestGW);
}

async function preloadSquads(gw) {
  if (!gw) return;
  var liveData = null;
  try { liveData = await fetchFPL('event/' + gw + '/live/'); } catch(e) { return; }
  var liveMap = {};
  (liveData.elements || []).forEach(function(e){ liveMap[e.id] = (e.stats && e.stats.total_points) || 0; });
  for (var i = 0; i < PLAYER_ORDER.length; i++) {
    var name = PLAYER_ORDER[i];
    var entryId = PLAYER_MAP[name];
    var cacheKey = entryId + '_' + gw;
    if (squadCache[cacheKey]) continue;
    try {
      var picksRes = await fetchFPL('entry/' + entryId + '/event/' + gw + '/picks/');
      squadCache[cacheKey] = { picks: picksRes.picks || [], liveMap: liveMap };
    } catch(e) {}
    await new Promise(function(r){ setTimeout(r, 200); });
  }
}

function shirtImg(teamCode, isBench) {
  if (!teamCode) return '<span class="player-card-shirt-fallback">\ud83d\udc55</span>';
  var url = 'https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_' + teamCode + (isBench ? '_1' : '') + '-110.png';
  return '<img src="' + url + '" onerror="this.parentNode.innerHTML=\'<span class=player-card-shirt-fallback>\ud83d\udc55</span>\'" alt="">';
}

function buildSquadHTML(picks, liveMap, isBench, usedVC, multiplier, isBB) {
  return picks.map(function(p) {
    var el = elementData[p.element] || { name: '#' + p.element, pos: 1, teamCode: 0 };
    var rawPts = liveMap[p.element] !== undefined ? liveMap[p.element] : null;
    var isCap = p.is_captain;
    var isVC = p.is_vice_captain;
    var isEffectiveCaptain = (!usedVC && isCap) || (usedVC && isVC);
    var displayPts;
    if (rawPts === null) { displayPts = '-'; }
    else if (isEffectiveCaptain && !isBench) { displayPts = rawPts * multiplier; }
    else { displayPts = rawPts; }
    var ptsClass = displayPts === '-' ? '' : displayPts > 0 ? '' : displayPts < 0 ? 'negative' : 'zero';
    var cardClass = 'player-card';
    if (!usedVC && isCap) cardClass += ' is-captain';
    if (usedVC && isVC) cardClass += ' is-vc-active';
    if (isBench && !isBB) cardClass += ' is-bench';
    var badge = '<div class="player-card-badge-spacer"></div>';
    if (!usedVC && isCap) { badge = '<div class="player-card-badge">\u00a9 C</div>'; }
    else if (usedVC && isVC) { badge = '<div class="player-card-badge vc-badge-card">\ud835\udcb1 VC</div>'; }
    return '<div class="' + cardClass + '">' +
      '<div class="player-card-shirt">' + shirtImg(el.teamCode, isBench && !isBB) + '</div>' +
      '<div class="player-card-name">' + el.name + '</div>' +
      '<div class="player-card-pts ' + ptsClass + '">' + displayPts + '</div>' +
      badge + '</div>';
  }).join('');
}

async function toggleSquad(entryId, gw, usedVC) {
  var squadRowId = 'squad-' + entryId;
  var existingRow = document.getElementById(squadRowId);
  var dataRow = document.querySelector('tr.data-row[data-entry="' + entryId + '"]');
  if (existingRow) { existingRow.remove(); if (dataRow) dataRow.classList.remove('expanded'); return; }
  if (dataRow) dataRow.classList.add('expanded');
  var colCount = dataRow ? dataRow.cells.length : 12;
  var squadRow = document.createElement('tr');
  squadRow.id = squadRowId;
  squadRow.className = 'squad-row';
  var cacheKey = entryId + '_' + gw;
  var capEntry = allCapLog.find(function(c){ return Number(c.entry_id) === Number(entryId) && c.gw === gw; });
  var chipRaw = capEntry ? (capEntry.chip || '') : '';
  var multiplier = CHIP_TC_KEYS.includes(chipRaw) ? 3 : 2;
  var isBB = chipRaw === 'bboost';

  /* ★ iOS 修正：正選+後備放入同一個 squad-grid，手機版用 grid repeat(8,1fr) 確保上8下7 */
  function renderSquadContent(picks, liveMap) {
    var starters = picks.filter(function(p){ return p.position <= 11; });
    var bench = picks.filter(function(p){ return p.position > 11; });
    return '<div class="squad-grid">' +
      buildSquadHTML(starters, liveMap, false, usedVC, multiplier, isBB) +
      buildSquadHTML(bench, liveMap, true, usedVC, multiplier, isBB) +
    '</div>';
  }

  if (squadCache[cacheKey]) {
    var d = squadCache[cacheKey];
    squadRow.innerHTML = '<td colspan="' + colCount + '"><div class="squad-container">' + renderSquadContent(d.picks, d.liveMap) + '</div></td>';
    if (dataRow) dataRow.insertAdjacentElement('afterend', squadRow);
  } else {
    squadRow.innerHTML = '<td colspan="' + colCount + '"><div class="squad-container"><div class="squad-loading">\u23f3 \u8f09\u5165\u9663\u5bb9...</div></div></td>';
    if (dataRow) dataRow.insertAdjacentElement('afterend', squadRow);
    try {
      var results = await Promise.all([
        fetchFPL('entry/' + entryId + '/event/' + gw + '/picks/'),
        fetchFPL('event/' + gw + '/live/')
      ]);
      var picksRes = results[0], liveRes = results[1];
      var liveMap = {};
      (liveRes.elements || []).forEach(function(e){ liveMap[e.id] = (e.stats && e.stats.total_points) || 0; });
      var picks = picksRes.picks || [];
      squadCache[cacheKey] = { picks: picks, liveMap: liveMap };
      squadRow.querySelector('.squad-container').innerHTML = renderSquadContent(picks, liveMap);
    } catch(e) {
      squadRow.querySelector('.squad-container').innerHTML = '<div class="squad-loading">\u274c \u8f09\u5165\u5931\u6557</div>';
    }
  }
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  refreshCountdown = 300;
  autoRefreshTimer = setInterval(async function() {
    refreshCountdown--;
    if (refreshCountdown <= 0) {
      document.getElementById('refresh-indicator').textContent = '\ud83d\udd04';
      await loadData();
      refreshCountdown = 300;
    } else {
      document.getElementById('refresh-indicator').textContent = '\u23f1 ' + refreshCountdown + 's';
    }
  }, 1000);
}

function renderModalChart(playerName, tab) {
  var gwSet = {}; allResults.forEach(function(r){ gwSet[r.gw]=1; });
  var gws = Object.keys(gwSet).map(Number).sort(function(a,b){return a-b;});
  var labels = gws.map(function(g){ return 'GW' + g; });
  var color = PLAYER_COLORS[PLAYER_ORDER.indexOf(playerName)] || '#58a6ff';
  var data, label;
  if (tab === 'penalty') {
    data = gws.map(function(gw){ var r = allResults.find(function(r){ return r.player_name === playerName && r.gw === gw; }); return r ? Math.abs(r.cumul_penalty) : null; });
    label = '\u7d2f\u7a4d\u7f70\u6b3e';
  } else {
    data = gws.map(function(gw){
      var gwData = allResults.filter(function(r){ return r.gw === gw; }).sort(function(a,b){ return b.cumul_net_points - a.cumul_net_points; });
      var idx = gwData.findIndex(function(r){ return r.player_name === playerName; });
      return idx >= 0 ? 9 - (idx + 1) : null;
    });
    label = '\u7d2f\u7a4d\u7e3d\u5206\u6392\u540d';
  }
  if (modalChart) { modalChart.destroy(); modalChart = null; }
  modalChart = new Chart(document.getElementById('modal-chart'), {
    type: 'line',
    data: { labels: labels, datasets: [{ label: label, data: data, borderColor: color, backgroundColor: color + '30', tension: 0.3, pointRadius: 4, borderWidth: 2, fill: true }] },
    options: {
      responsive: true, plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e', font: { size: 11 }, callback: function(v){ return tab === 'penalty' ? '$' + v : '\u7b2c' + (9-v) + '\u540d'; } }, grid: { color: '#21262d' }, reverse: false, min: tab === 'rank' ? 1 : undefined, max: tab === 'rank' ? 8 : undefined }
      }
    }
  });
}

function renderWeekly(gw) {
  if (!gw) return;
  currentGW = gw;
  document.getElementById('weekly-title').textContent = 'GW' + gw + ' \u8a73\u60c5';

  var gwSet = {}; allResults.forEach(function(r){ gwSet[r.gw]=1; });
  var allGWs = Object.keys(gwSet).map(Number);
  var gwTotals = allGWs.map(function(g) {
    var d = allResults.filter(function(r){ return r.gw === g; });
    return { gw: g, total: d.reduce(function(s,r){ return s + Math.abs(r.total_penalty); }, 0) };
  }).sort(function(a,b){ return b.total - a.total; });
  if (gwTotals.length && gwTotals[0].gw === gw) {
    document.getElementById('worst-gw-badge').style.display = 'inline';
    document.getElementById('worst-gw-badge').textContent = '\ud83d\udc80 \u6700\u8870\u5468';
  } else {
    document.getElementById('worst-gw-badge').style.display = 'none';
  }

  var gwResults = allResults.filter(function(r){ return r.gw === gw; });
  var caps = allCapLog.filter(function(r){ return r.gw === gw; });
  if (!gwResults.length) { document.getElementById('weekly-table').innerHTML = '<div class="loading">\u672a\u6709\u6578\u64da</div>'; return; }

  var minPts = Math.min.apply(null, gwResults.map(function(r){ return r.gross_points; }));
  var ranked = gwResults.slice().sort(function(a,b){ return b.cumul_net_points - a.cumul_net_points; });
  var rankMap = {};
  ranked.forEach(function(r, i){ rankMap[r.player_name] = i + 1; });

  var prevGWResults = allResults.filter(function(r){ return r.gw === gw - 1; });
  var prevRanks = {};
  if (prevGWResults.length) {
    prevGWResults.slice().sort(function(a,b){ return b.cumul_net_points - a.cumul_net_points; }).forEach(function(r, i){
      prevRanks[r.player_name] = i + 1;
    });
  }

  var sortKey = currentSort.key;
  var sortDir = currentSort.dir;
  var data = gwResults.slice().sort(function(a,b) {
    var va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortDir === 'asc' ? va - vb : vb - va;
  });

  function sortArrow(key) {
    if (currentSort.key !== key) return '';
    return '<span class="sort-arrow">' + (currentSort.dir === 'asc' ? '\u25b2' : '\u25bc') + '</span>';
  }

  var tableEl = document.createElement('table');
  var thead = document.createElement('tr');
  var cols = [
    { label: '\u73a9\u5bb6', mobLabel: '\u73a9\u5bb6', key: 'player_name', cls: '' },
    { label: '\u4eca\u5468\u5206', mobLabel: 'PT', key: 'gross_points', cls: '' },
    { label: 'League\u7f70\u6b3e', mobLabel: '', key: 'league_penalty', cls: 'desk-only' },
    { label: 'H2H\u7f70\u6b3e', mobLabel: '', key: 'h2h_penalty', cls: 'desk-only' },
    { label: '\u4eca\u5468$$$$', mobLabel: '$$$', key: 'total_penalty', cls: 'col-important' },
    { label: '\u7d2f\u7a4d\u7f70\u6b3e', mobLabel: 'Total', key: 'cumul_penalty', cls: 'col-important' },
    { label: '\u7d2f\u7a4d\u7e3d\u5206', mobLabel: '', key: 'cumul_net_points', cls: 'col-important desk-only' },
    { label: '\u968a\u9577', mobLabel: '', key: null, cls: 'desk-only' },
    { label: '\u4eca\u5468Cap\u5206', mobLabel: '', key: null, cls: 'desk-only' },
    { label: '\u7d2f\u7a4dCap\u5206', mobLabel: '', key: null, cls: 'desk-only' },
    { label: '\u6210\u529f\u7387', mobLabel: '', key: null, cls: 'desk-only' },
    { label: 'Chip', mobLabel: '', key: null, cls: 'desk-only' }
  ];
  cols.forEach(function(col) {
    var th = document.createElement('th');
    th.className = col.cls + (col.key ? ' sortable' : '');
    if (col.mobLabel && col.mobLabel !== col.label) {
      th.innerHTML = '<span class="desk-label">' + col.label + '</span><span class="mob-label">' + col.mobLabel + '</span>' + sortArrow(col.key);
    } else {
      th.innerHTML = col.label + sortArrow(col.key);
    }
    if (col.key) {
      (function(k){
        th.addEventListener('click', function() {
          if (currentSort.key === k) currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
          else { currentSort.key = k; currentSort.dir = 'desc'; }
          renderWeekly(gw);
        });
      })(col.key);
    }
    thead.appendChild(th);
  });
  tableEl.appendChild(thead);

  /* ★ 移除「-」號 */
  function fmt(v) { return '$' + Math.abs(v); }

  data.forEach(function(r) {
    var rank = rankMap[r.player_name];
    var cap = caps.find(function(c){ return Number(c.entry_id) === Number(r.entry_id); });
    var isLast = r.gross_points === minPts;
    var isLow = r.gross_points < 45 && !isLast;
    var entryId = PLAYER_MAP[r.player_name];

    var moveHtml = '';
    if (prevRanks[r.player_name]) {
      var diff = prevRanks[r.player_name] - rank;
      if (diff > 0) moveHtml = '<span class="move-up">\u25b2</span>';
      else if (diff < 0) moveHtml = '<span class="move-down">\u25bc</span>';
      else moveHtml = '<span class="move-same">\ud83d\udd35</span>';
    }

    var usedVC = cap && cap.captain && cap.captain.includes('(VC)');
    var capDisplayName = cap ? cap.captain.replace(' (VC)', '') : '-';
    var chip = cap ? (CHIP_DISPLAY[cap.chip] || '') : '';
    var chipHtml = chip ? '<span class="chip-badge mob-only">' + chip + '</span>' : '';
    var capPts = cap ? cap.captain_pts : '-';
    var capOK = cap ? cap.cap_ok : null;

    var capNameHtml = '-';
    if (cap) {
      var colorClass = capOK === 1 ? 'cap-ok' : 'cap-fail';
      var vcLabel = usedVC ? '<span class="vc-badge">(VC)</span>' : '';
      capNameHtml = '<span class="' + colorClass + '">' + capDisplayName + vcLabel + '</span>';
    }

    var allCapsForPlayer = allCapLog.filter(function(c){ return c.player_name === r.player_name && c.gw <= gw; });
    var ok = allCapsForPlayer.filter(function(c){ return c.cap_ok === 1; }).length;
    var total = allCapsForPlayer.length;
    var rate = total > 0 ? (ok/total*100).toFixed(0) + '%' : '-';
    var cumulCapPts = allCapsForPlayer.reduce(function(s,c){ return s + (c.captain_pts || 0); }, 0);

    var tr = document.createElement('tr');
    tr.className = 'data-row' + (isLast ? ' last-place' : isLow ? ' low-score' : '');
    tr.setAttribute('data-entry', entryId);
    tr.setAttribute('data-gw', gw);
    tr.innerHTML =
      '<td>' + moveHtml + '<span class="rank-inline">' + rank + '</span><strong class="player-link" data-name="' + r.player_name + '">' + r.player_name + '</strong>' + chipHtml + '</td>' +
      '<td>' + r.gross_points + '</td>' +
      '<td class="desk-only">' + fmt(r.league_penalty) + '</td>' +
      '<td class="desk-only">' + fmt(r.h2h_penalty) + '</td>' +
      '<td class="col-important">' + fmt(r.total_penalty) + '</td>' +
      '<td class="col-important">' + fmt(r.cumul_penalty) + '</td>' +
      '<td class="col-important desk-only">' + r.cumul_net_points + '</td>' +
      '<td class="desk-only">' + capNameHtml + '</td>' +
      '<td class="desk-only">' + capPts + '</td>' +
      '<td class="desk-only">' + cumulCapPts + '</td>' +
      '<td class="desk-only">' + rate + '</td>' +
      '<td class="desk-only">' + chip + '</td>';

    tr.querySelector('.player-link').addEventListener('click', function(e) {
      e.stopPropagation();
      showPlayerChart(r.player_name);
    });
    (function(eid, g, vc){ tr.addEventListener('click', function(){ toggleSquad(eid, g, vc); }); })(entryId, gw, usedVC);
    tableEl.appendChild(tr);
  });

  var totalPool = gwResults.reduce(function(s,r){ return s + Math.abs(r.cumul_penalty); }, 0);
  var wrapper = document.getElementById('weekly-table');
  wrapper.innerHTML = '';
  wrapper.appendChild(tableEl);
  var footer = document.createElement('div');
  footer.className = 'pool-footer';
  footer.innerHTML = '\ud83d\udcb0 \u622a\u81f3 GW' + gw + ' \u5168\u9ad4\u7d2f\u7a4d\u7f70\u6b3e\uff1a<strong style="color:#f85149;font-size:15px;">$' + totalPool + '</strong>';
  wrapper.appendChild(footer);
}

function renderSummaryTable() {
  var data = PLAYER_ORDER.map(function(name) {
    var rows = allResults.filter(function(r){ return r.player_name === name; }).sort(function(a,b){ return b.gw - a.gw; });
    var latest = rows[0];
    return { name: name, penalty: latest ? latest.cumul_penalty : 0, pts: latest ? latest.cumul_net_points : 0 };
  }).sort(function(a,b){ return a.penalty - b.penalty; });
  if (!data.some(function(d){ return d.pts > 0; })) { document.getElementById('summary-table').innerHTML = '<div class="loading">\u672a\u6709\u6578\u64da</div>'; return; }

      '<td class="col-important">' + p.pts + '</td></tr>';
  });
  html += '</table>';
  document.getElementById('summary-table').innerHTML = html;
  var footer = document.createElement('div');
  footer.className = 'pool-footer';
  footer.innerHTML = '\ud83d\udcb0 \u5168\u5b63\u7d2f\u7a4d\u7f70\u6b3e\u7e3d\u984d\uff1a<strong style="color:#f85149;font-size:15px;">$' + totalPool + '</strong>';
  document.getElementById('summary-table').appendChild(footer);
}

function renderCaptainTable() {
  var data = PLAYER_ORDER.map(function(name) {
    var c = allCapLog.filter(function(r){ return r.player_name === name; });
    var total = c.length;
    var ok = c.filter(function(x){ return x.cap_ok === 1; }).length;

    return { name: name, totalPts: totalPts, ok: ok, total: total, rate: total > 0 ? (ok/total*100).toFixed(0) : 0 };

      '<td class="col-important"><strong>' + p.totalPts + '</strong></td>' +
      '<td>' + p.rate + '% (' + p.ok + '/' + p.total + ')</td></tr>';

  html += '</table>';
  document.getElementById('captain-table').innerHTML = html;
}

function renderLastPlaceTable() {

  data.forEach(function(p, i) {
    html += '<tr><td class="rank-num">' + (i+1) + '</td><td><strong>' + p.name + '</strong></td><td>' + p.count + ' \u6b21</td></tr>';
  });
  html += '</table>';
  document.getElementById('lastplace-table').innerHTML = html;
}

}

async function updateGW() {
  if (!checkPwd()) return;
  var gw = parseInt(document.getElementById('gw-input').value);
  if (!gw || gw < 1 || gw > 38) { setStatus('\u274c \u8acb\u8f38\u5165\u6709\u6548 GW', 'err'); return; }
  setAllDisabled(true); setStatus('\u23f3 \u66f4\u65b0 GW' + gw + '...', '');
  try { await runUpdate(gw); setStatus('\u2705 GW' + gw + ' \u5b8c\u6210\uff01', 'ok'); }
  catch(e) { setStatus('\u274c ' + e.message, 'err'); }
  setAllDisabled(false);
}

async function updateLatest() {
  if (!checkPwd()) return;
  setAllDisabled(true); setStatus('\ud83d\udd04 \u62ce\u7dca\u7576\u524d GW...', '');
  try {
    var boot = await fetchFPL('bootstrap-static/');
    var gw = 0;
    boot.events.forEach(function(e){ if (e.is_current) gw = e.id; });
    if (!gw) boot.events.forEach(function(e){ if (e.finished && e.id > gw) gw = e.id; });
    if (!gw) { setStatus('\u274c \u641e\u5514\u5230\u7576\u524d GW', 'err'); setAllDisabled(false); return; }
    await runUpdate(gw); setStatus('\u2705 GW' + gw + ' \u5b8c\u6210\uff01', 'ok');
  } catch(e) { setStatus('\u274c ' + e.message, 'err'); }
  setAllDisabled(false);
}

async function batchUpdate() {
  if (!checkPwd()) return;
  var from = parseInt(document.getElementById('batch-from').value);
  var to = parseInt(document.getElementById('batch-to').value);
  if (!from || !to || from > to) { setStatus('\u274c GW \u7bc4\u570d\u7121\u6548', 'err'); return; }
  if (to - from >= 8) { setStatus('\u274c \u6bcf\u6b21\u6700\u591a 8 \u500b GW', 'err'); return; }
  setAllDisabled(true);
  for (var gw = from; gw <= to; gw++) {
    setStatus('\u23f3 GW' + gw + '...\uff08' + (gw-from+1) + '/' + (to-from+1) + '\uff09', '');
    try { await runUpdate(gw); } catch(e) { setStatus('\u274c GW' + gw + ' \u51fa\u932f\uff1a' + e.message, 'err'); }
    await new Promise(function(r){ setTimeout(r, 1000); });
  }
  setStatus('\u2705 GW' + from + '\u2013' + to + ' \u5b8c\u6210\uff01', 'ok');
  setAllDisabled(false);
}

function resolveEffectiveCaptain(capEl, vcEl, liveData, rawChip, teamMatchStatus, elementTeam) {
  var isTC = CHIP_TC_KEYS.includes(rawChip);
  if (isTC) return { el: capEl, multiplier: 3, usedVC: false };
  var capMins = (liveData[capEl] && liveData[capEl].minutes) || 0;
  var capTeam = elementTeam[capEl];
  var capStatus = capTeam ? (teamMatchStatus[capTeam] || { noFixture: true }) : { noFixture: true };
  if (capMins === 0 && (capStatus.noFixture || capStatus.kickedOff) && vcEl) return { el: vcEl, multiplier: 2, usedVC: true };
  return { el: capEl, multiplier: 2, usedVC: false };
}

async function runUpdate(gw) {
  var results = await Promise.all([
    fetchFPL('leagues-h2h-matches/league/' + LEAGUE_ID + '/?event=' + gw),
    fetchFPL('bootstrap-static/'), fetchFPL('event/' + gw + '/live/'), fetchFPL('fixtures/?event=' + gw)
  ]);
  var h2hRes = results[0], bootRes = results[1], liveRes = results[2], fixtureRes = results[3];
  var netByEntry = {};
  (h2hRes.results || []).forEach(function(m){ netByEntry[m.entry_1_entry] = m.entry_1_points; netByEntry[m.entry_2_entry] = m.entry_2_points; });
  var elementName = {}, elementTeam = {};
  (bootRes.elements || []).forEach(function(el){ elementName[el.id] = el.web_name; elementTeam[el.id] = el.team; });
  var liveData = {};
  (liveRes.elements || []).forEach(function(e){ liveData[e.id] = { points: (e.stats && e.stats.total_points) || 0, minutes: (e.stats && e.stats.minutes) || 0 }; });
  var now = new Date();
  var teamMatchStatus = {};
  (fixtureRes || []).forEach(function(f) {
    if (!f.kickoff_time) return;
    var mins = (now - new Date(f.kickoff_time)) / 60000;
    var s = { kickedOff: mins >= 20, finished: f.finished || false, noFixture: false };
    teamMatchStatus[f.team_h] = s; teamMatchStatus[f.team_a] = s;
  });
  var picksData = await Promise.all(Object.keys(PLAYER_MAP).map(async function(name) {
    try { return { name: name, entryId: PLAYER_MAP[name], data: await fetchFPL('entry/' + PLAYER_MAP[name] + '/event/' + gw + '/picks/') }; }
    catch(e) { return { name: name, entryId: PLAYER_MAP[name], data: null }; }
  }));
  var grossByEntry = {}, capElByEntry = {}, vcElByEntry = {}, rawChipByEntry = {};
  picksData.forEach(function(item) {
    var entryId = item.entryId, data = item.data;
    if (!data || !data.entry_history) return;
    var net = netByEntry[entryId];
    if (typeof net === 'number') grossByEntry[entryId] = net + (data.entry_history.event_transfers_cost || 0);
    var cap = (data.picks || []).find(function(p){ return p.is_captain; });
    var vc = (data.picks || []).find(function(p){ return p.is_vice_captain; });
    if (cap) capElByEntry[entryId] = cap.element;
    if (vc) vcElByEntry[entryId] = vc.element;
    rawChipByEntry[entryId] = data.active_chip || '';
  });
  var grossArr = Object.values(grossByEntry).filter(function(v){ return typeof v === 'number'; });
  var minGross = grossArr.length ? Math.min.apply(null, grossArr) : -1;
  var prevResults = await supabaseGet('weekly_results', '?gw=eq.' + (gw - 1));
  var prevByEntry = {};
  if (Array.isArray(prevResults)) prevResults.forEach(function(r){ prevByEntry[Number(r.entry_id)] = r; });
  var weeklyRows = [], capRows = [];
  picksData.forEach(function(item) {
    var name = item.name, entryId = item.entryId;
    var gross = grossByEntry[entryId], net = netByEntry[entryId];
    if (typeof gross !== 'number' || typeof net !== 'number') return;
    var lp = (gross < 45 ? -20 : 0) + (gross === minGross ? -20 : 0);
    var h2hp = calcH2H(h2hRes.results || [], entryId);
    var prev = prevByEntry[Number(entryId)];
    weeklyRows.push({
      gw: gw, player_name: name, entry_id: entryId, gross_points: gross, net_points: net,
      league_penalty: lp, h2h_penalty: h2hp, total_penalty: lp + h2hp,
      cumul_penalty: (prev ? prev.cumul_penalty : 0) + lp + h2hp,
      cumul_net_points: (prev ? prev.cumul_net_points : 0) + net,
      updated_at: new Date().toISOString()
    });
    var capEl = capElByEntry[entryId], vcEl = vcElByEntry[entryId];
    var rawChip = rawChipByEntry[entryId] || '';
    if (capEl) {
      var eff = resolveEffectiveCaptain(capEl, vcEl, liveData, rawChip, teamMatchStatus, elementTeam);
      var rawPts = (liveData[eff.el] && liveData[eff.el].points) || 0;
      capRows.push({
        gw: gw, player_name: name, entry_id: entryId,
        captain: (elementName[eff.el] || eff.el) + (eff.usedVC ? ' (VC)' : ''),
        captain_pts: rawPts * eff.multiplier,
        cap_ok: rawPts >= 4 ? 1 : 0,
        chip: rawChip, updated_at: new Date().toISOString()
      });
    }
  });
  await supabaseUpsert('weekly_results', weeklyRows);
  await supabaseUpsert('cap_log', capRows);
  await loadData();
}

function calcH2H(matches, entryId) {
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    if (m.entry_1_entry === entryId) return m.entry_1_points < m.entry_2_points ? -20 : 0;
    if (m.entry_2_entry === entryId) return m.entry_2_points < m.entry_1_points ? -20 : 0;
  }
  return 0;
}

function setStatus(msg, type) {
  var el = document.getElementById('admin-status');
  el.textContent = msg; el.className = 'status-msg ' + type;
}

loadData();
</script>
