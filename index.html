<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽️ 完季食大餐 🍽️🍻</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#161b22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FPL罰款">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-body: #0d1117;
    --bg-card: #161b22;
    --bg-header: #1c2128;
    --bg-input: #21262d;
    --border: #30363d;
    --border-inner: #21262d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-orange: #f0883e;
    --tab-active: #1f6feb;
    --btn-green: #238636;
    --btn-green-hover: #2ea043;
    --last-place-bg: #4a0000;
    --low-score-bg: #2d2b10;
    --worst-row-bg: #2d1515;
    --modal-overlay: rgba(0,0,0,0.8);
  }
  body.light {
    --bg-body: #f6f8fa;
    --bg-card: #ffffff;
    --bg-header: #f0f3f6;
    --bg-input: #e8ecf0;
    --border: #d0d7de;
    --border-inner: #d8dee4;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --accent-blue: #0969da;
    --accent-green: #1a7f37;
    --accent-red: #cf222e;
    --accent-orange: #bc4c00;
    --tab-active: #0969da;
    --btn-green: #1a7f37;
    --btn-green-hover: #218739;
    --last-place-bg: #f8d0ce;
    --low-score-bg: #fff8c5;
    --worst-row-bg: #ffebe9;
    --modal-overlay: rgba(0,0,0,0.5);
  }
  .theme-toggle { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; line-height: 1; }
  body.light .player-card.is-captain { border-color: #d4a000; box-shadow: 0 0 10px rgba(180,140,0,0.5), inset 0 0 10px rgba(180,140,0,0.15); }
  body.light .player-card.is-vc-active { border-color: #8a8a8a; box-shadow: 0 0 10px rgba(100,100,100,0.45), inset 0 0 10px rgba(100,100,100,0.15); }
  body.light .player-card-badge { background: #d4a000; }
  body.light .player-card-badge.vc-badge-card { background: #8a8a8a; color: #fff; }

  body { background: var(--bg-body); color: var(--text-primary); font-family: -apple-system, sans-serif; }
  .header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; color: var(--accent-blue); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .last-updated { color: var(--text-secondary); font-size: 12px; }
  .admin-toggle { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .gw-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .gw-bar-label { color: var(--text-secondary); font-size: 13px; white-space: nowrap; }
  .gw-select { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .nav-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .nav-tab { flex: 1; text-align: center; padding: 8px 4px; cursor: pointer; color: var(--text-secondary); border-radius: 6px; font-size: 13px; transition: all 0.2s; }
  .nav-tab.active { background: var(--tab-active); color: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } .nav-tab { font-size: 11px; padding: 6px 2px; } .desk-only { display: none !important; } .chip-badge.mob-only { display: inline !important; } .desk-label { display: none !important; } .mob-label { display: inline !important; } th { padding: 5px 4px; font-size: 10px; } td { padding: 5px 4px; font-size: 11px; } table { width: 100%; min-width: auto; } td:first-child { position: static; border-right: none; } th:first-child { left: auto; border-right: none; } .rank-inline { font-size: 10px; } .move-up, .move-down, .move-same { font-size: 0; width: 0; height: 0; display: inline-block; vertical-align: middle; margin-right: 2px; overflow: hidden; } .move-up { border-left: 3px solid transparent; border-right: 3px solid transparent; border-bottom: 4px solid #3fb950; } .move-down { border-left: 3px solid transparent; border-right: 3px solid transparent; border-top: 4px solid #f85149; } .move-same { width: 4px; height: 4px; border-radius: 50%; background: var(--accent-blue); } .chip-badge { font-size: 7px; margin-left: 2px; } th.sortable { cursor: default; pointer-events: none; } .sort-arrow { display: none !important; } }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
  .card-title { padding: 12px 16px; background: var(--bg-header); font-size: 14px; font-weight: 600; color: var(--accent-blue); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .worst-gw-badge { background: var(--accent-red); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .overflow-x { overflow: auto; -webkit-overflow-scrolling: touch; max-height: 80vh; }
  table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; }
  th { padding: 10px 14px; text-align: left; font-size: 12px; color: var(--text-secondary); font-weight: 500; background: var(--bg-header); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 4; }
  td { padding: 10px 14px; border-top: 1px solid var(--border-inner); font-size: 13px; }
  td.col-important { font-weight: 700; }
  tr.data-row { cursor: pointer; }
  tr.data-row:hover td { background: var(--bg-header); }
  tr.data-row.expanded td { background: var(--bg-header); }
  th:first-child { position: sticky; left: 0; top: 0; z-index: 5; background: var(--bg-header); border-right: 1px solid var(--border); }
  td:first-child { position: sticky; left: 0; z-index: 2; background: var(--bg-card); border-right: 1px solid var(--border); }
  tr.data-row:hover td:first-child { background: var(--bg-header); }
  tr.data-row.expanded td:first-child { background: var(--bg-header); }
  .last-place td { background: var(--last-place-bg) !important; }
  .last-place td:first-child { background: var(--last-place-bg) !important; border-left-color: var(--accent-red); }
  .low-score td { background: var(--low-score-bg) !important; }
  .low-score td:first-child { background: var(--low-score-bg) !important; }
  td:first-child { border-left: 3px solid transparent; }
  .rank-num { color: var(--text-secondary); }
  .rank-inline { color: var(--text-secondary); font-size: 12px; font-weight: 700; margin-right: 2px; }
  .move-up, .move-down, .move-same { display: inline-block; margin-right: 3px; vertical-align: middle; line-height: 1; }
  .move-up { color: var(--accent-green); font-size: 14px; }
  .move-down { color: var(--accent-red); font-size: 14px; }
  .move-same { font-size: 11px; }
  .chip-badge { font-size: 9px; margin-left: 4px; opacity: 0.85; }
  .chip-badge.mob-only { display: none; }
  .mob-label { display: none; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text-primary); }
  .sort-arrow { font-size: 9px; margin-left: 2px; color: var(--accent-blue); }
  .vc-badge { color: var(--accent-orange); font-size: 11px; margin-left: 3px; }
  .cap-ok { color: var(--accent-green); font-weight: 600; }
  .cap-fail { color: var(--accent-orange); font-weight: 600; }
  .player-link { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px; }
  .player-link:hover { color: var(--accent-blue); }
  tr.squad-row td { padding: 0; border-top: none; background: var(--bg-body) !important; }
  tr.squad-row td:first-child { background: var(--bg-body) !important; border-right: none; position: static; }
  .squad-container { padding: 16px; border-top: 1px solid var(--border); }
  .squad-section-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .squad-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .player-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; width: 90px; text-align: center; overflow: hidden; flex-shrink: 0; position: relative; }
  .player-card.is-captain { border: 2px solid #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.5), inset 0 0 8px rgba(255,215,0,0.15); }
  .player-card.is-vc-active { border: 2px solid #c0c0c0; box-shadow: 0 0 8px rgba(192,192,192,0.5), inset 0 0 8px rgba(192,192,192,0.15); }
  .player-card.is-bench { opacity: 0.55; }
  .player-card-shirt { padding: 6px 0 2px; background: var(--bg-header); height: 68px; display: flex; align-items: center; justify-content: center; }
  .player-card-shirt img { height: 56px; width: auto; object-fit: contain; }
  .player-card-shirt-fallback { font-size: 32px; }
  .player-card-name { font-size: 10px; font-weight: 600; padding: 3px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; background: var(--accent-blue); color: #fff; }
  .player-card-pts { font-size: 14px; font-weight: 700; padding: 2px 4px 3px; color: var(--accent-green); }
  .player-card-pts.zero { color: var(--text-secondary); }
  .player-card-pts.negative { color: var(--accent-red); }
  .player-card-badge { position: absolute; top: 3px; left: 3px; font-size: 8px; padding: 2px 4px; background: #ffd700; color: #000; font-weight: 700; border-radius: 3px; line-height: 1; z-index: 1; }
  .player-card-badge.vc-badge-card { background: #c0c0c0; }
  .squad-loading { color: var(--text-secondary); font-size: 13px; padding: 20px; text-align: center; }
  .admin-panel { display: none; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .admin-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .admin-input { background: var(--bg-body); border: 1px solid var(--border); color: var(--text-primary); padding: 7px 12px; border-radius: 6px; font-size: 13px; }
  .btn-green { background: var(--btn-green); border: 1px solid var(--btn-green-hover); color: #fff; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-green:hover { background: var(--btn-green-hover); }
  .btn-green:disabled { background: var(--bg-input); border-color: #30363d; color: var(--text-secondary); cursor: not-allowed; }
  .status-msg { font-size: 13px; margin-top: 8px; color: var(--text-secondary); }
  .status-msg.ok { color: var(--accent-green); }
  .status-msg.err { color: var(--accent-red); }
  .admin-section-label { color: var(--text-secondary); font-size: 12px; margin-bottom: 6px; }
  .divider { border-top: 1px solid var(--border); margin: 14px 0; }
  .loading { padding: 40px; text-align: center; color: var(--text-secondary); }
  .auto-refresh-indicator { font-size: 11px; color: var(--accent-green); }
  .pool-footer { padding: 12px 16px; background: var(--bg-header); border-top: 2px solid var(--border); font-size: 13px; color: var(--text-secondary); }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--accent-blue); }
  .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; padding: 0 4px; }
  .modal-close:hover { color: var(--text-primary); }
  .modal-chart-tabs { display: flex; gap: 4px; padding: 12px 16px; background: var(--bg-header); border-bottom: 1px solid var(--border); }
  .modal-tab { padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-secondary); border: 1px solid var(--border); }
  .modal-tab.active { background: var(--tab-active); color: #fff; border-color: var(--tab-active); }
  .modal-chart-container { padding: 20px; }

  /* ===== H2H 對賽（官網風格）===== */
  .h2h-list { padding: 0; }
  .h2h-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .h2h-row:last-child { border-bottom: none; }
  .h2h-side { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .h2h-side.left { align-items: flex-end; text-align: right; }
  .h2h-side.right { align-items: flex-start; text-align: left; }
  .h2h-side-name { font-size: 13px; font-weight: 600; }
  .h2h-side-team { font-size: 10px; color: var(--text-secondary); }
  .h2h-scores { display: flex; margin: 0 12px; flex-shrink: 0; }
  .h2h-score-box { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; }
  .h2h-score-box:first-child { border-radius: 4px 0 0 4px; }
  .h2h-score-box:last-child { border-radius: 0 4px 4px 0; }
  .h2h-score-box.win { background: var(--accent-green); }
  .h2h-score-box.lose { background: var(--accent-red); }
  .h2h-score-box.draw { background: var(--text-secondary); }
  @media (max-width: 700px) {
    .h2h-row { padding: 8px 10px; }
    .h2h-side-name { font-size: 11px; }
    .h2h-side-team { font-size: 8px; }
    .h2h-scores { margin: 0 6px; }
    .h2h-score-box { width: 30px; height: 30px; font-size: 13px; }
  }

  .squad-mobile { display: none; }

  /* ===== 手機版陣容卡片（已修復 iOS display:contents bug）===== */
  @media (max-width: 700px) {
    .squad-desktop { display: none; }
    .squad-mobile { display: block; }
    .squad-container { padding: 4px; width: 100%; max-width: 100%; overflow: hidden; box-sizing: border-box; }
    .squad-mobile .squad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 2px; }
    .player-card { width: auto; border-radius: 3px; border-width: 1px; position: relative; }
    .player-card.is-bench { opacity: 0.45; }
    .player-card-shirt { padding: 2px 0 1px; height: 34px; }
    .player-card-shirt img { height: 28px; }
    .player-card-shirt-fallback { font-size: 15px; }
    .player-card-name { font-size: 7px; padding: 1px 1px; white-space: nowrap; }
    .player-card-pts { font-size: 10px; padding: 0 1px 2px; }
    .player-card-badge { font-size: 5px; padding: 1px 2px; top: 1px; left: 1px; }
    /* 手機版升跌：CSS shapes 覆蓋桌面版 text */
    .move-up, .move-down, .move-same { font-size: 0; width: 0; height: 0; overflow: hidden; }
    .move-up { border-left: 3px solid transparent; border-right: 3px solid transparent; border-bottom: 4px solid #3fb950; }
    .move-down { border-left: 3px solid transparent; border-right: 3px solid transparent; border-top: 4px solid #f85149; }
    .move-same { width: 4px; height: 4px; border-radius: 50%; background: var(--accent-blue); }
  }
</style>

<div class="header">
  <h1>⚽️ 完季食大餐 🍽️🍻</h1>
  <div class="header-right">
    <span class="auto-refresh-indicator" id="refresh-indicator"></span>
    <span class="last-updated" id="last-updated">載入中...</span>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
    <button class="admin-toggle" onclick="toggleAdmin()">🔧 更新</button>
  </div>
</div>

<div class="modal-overlay" id="player-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-player-name"></span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-chart-tabs">
      <div class="modal-tab active" onclick="switchModalTab('penalty')">💰 罰款走勢</div>
      <div class="modal-tab" onclick="switchModalTab('rank')">🏆 總排名走勢</div>
    </div>
    <div class="modal-chart-container">
      <canvas id="modal-chart"></canvas>
    </div>
  </div>
</div>

<div class="container">
  <div class="admin-panel" id="admin-panel">
    <div class="admin-section-label">密碼</div>
    <div class="admin-row">
      <input type="password" class="admin-input" id="admin-password" placeholder="密碼" style="width:150px">
    </div>
    <div class="admin-section-label">單周更新</div>
    <div class="admin-row">
      <input type="number" class="admin-input" id="gw-input" placeholder="GW" min="1" max="38" style="width:80px">
      <button class="btn-green" onclick="updateGW()" id="update-btn">⚡️ 指定 GW</button>
      <button class="btn-green" onclick="updateLatest()" id="latest-btn">🔄 最新 GW</button>
    </div>
    <div class="divider"></div>
    <div class="admin-section-label">批量補跑（每次最多 8 個 GW）</div>
    <div class="admin-row">
      <input type="number" class="admin-input" id="batch-from" placeholder="由" min="1" max="38" style="width:70px">
      <span style="color:var(--text-secondary)">–</span>
      <input type="number" class="admin-input" id="batch-to" placeholder="至" min="1" max="38" style="width:70px">
      <button class="btn-green" onclick="batchUpdate()" id="batch-btn">📦 批量跑</button>
    </div>
    <div class="status-msg" id="admin-status"></div>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchView('weekly')">📅 本周</div>
    <div class="nav-tab" onclick="switchView('summary')">🏆 總覽</div>
  </div>

  <div id="view-weekly">
    <div class="gw-bar" id="gw-bar" style="display:none">
      <span class="gw-bar-label">睇指定周：</span>
      <select class="gw-select" id="gw-select" onchange="onGWSelect()">
        <option value="">-- 揀 GW --</option>
      </select>
    </div>
    <div class="card">
      <div class="card-title">
        <span id="weekly-title">最新 GW 詳情</span>
        <span class="worst-gw-badge" id="worst-gw-badge" style="display:none"></span>
      </div>
      <div class="overflow-x">
        <div id="weekly-table"><div class="loading">載入中...</div></div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="card-title">⚔️ H2H 對賽</div>
        <div id="h2h-matches"><div class="loading">載入中...</div></div>
      </div>
      <div class="card">
        <div class="card-title">📊 H2H 積分榜</div>
        <div class="overflow-x">
          <div id="h2h-standings"><div class="loading">載入中...</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-summary" style="display:none">
    <div class="grid">
      <div class="card">
        <div class="card-title">💰 全季罰款排行</div>
        <div class="overflow-x"><div id="summary-table"><div class="loading">載入中...</div></div></div>
      </div>
      <div class="card">
        <div class="card-title">👑 隊長總得分排行</div>
        <div class="overflow-x"><div id="captain-table"><div class="loading">載入中...</div></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">😭 包尾次數排行</div>
      <div class="overflow-x"><div id="lastplace-table"><div class="loading">載入中...</div></div></div>
    </div>
    <div class="card">
      <div class="card-title">💀 最衰周排行</div>
      <div class="overflow-x"><div id="worstgw-table"><div class="loading">載入中...</div></div></div>
    </div>
  </div>
</div>

};
const PLAYER_ORDER = Object.keys(PLAYER_MAP);
const PLAYER_COLORS = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#ff7b72','#ffa657','#79c0ff','#56d364'];
const CHIP_TC_KEYS = ['triple_captain', '3xc'];
const CHIP_DISPLAY = {
  'triple_captain': '👑 TC', '3xc': '👑 TC',
  'bboost': '🚀 BB', 'wildcard': '🔄 WC', 'freehit': '🆓 FH'
};

let allResults = [], allCapLog = [], latestGW = null;
let currentGW = null;
let autoRefreshTimer = null, refreshCountdown = 300;
let modalChart = null, currentModalPlayer = null, currentModalTab = 'penalty';
let elementData = {};
let currentSort = { key: 'cumul_net_points', dir: 'desc' };
const squadCache = {};

async function supabaseGet(table, query = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}

async function supabaseUpsert(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=gw,entry_id`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) { const err = await res.text(); throw new Error(`Supabase 寫入失敗：${err}`); }
  return true;
}

async function fetchFPL(path) {
  const res = await fetch(
    `https://ucwsinzfpvjzdeqncjqc.supabase.co/functions/v1/bright-processor?path=${encodeURIComponent(path)}`,
    { headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  return JSON.parse(await res.text());
}

async function loadData() {
  allResults = await supabaseGet('weekly_results', '?order=gw.asc');
  allCapLog = await supabaseGet('cap_log', '?order=gw.asc');
  if (!Array.isArray(allResults)) allResults = [];
  if (!Array.isArray(allCapLog)) allCapLog = [];

  const gws = [...new Set(allResults.map(r => r.gw))].sort((a,b) => a-b);
  if (gws.length > 0) {
    latestGW = gws[gws.length - 1];
    if (!currentGW) currentGW = latestGW;
    const sel = document.getElementById('gw-select');
    sel.innerHTML = '<option value="">-- 揀 GW --</option>' + gws.map(g => `<option value="${g}" ${g === currentGW ? 'selected' : ''}>GW${g}</option>`).join('');
    document.getElementById('gw-bar').style.display = 'flex';
    const latest = allResults.reduce((a,b) => a.updated_at > b.updated_at ? a : b, allResults[0]);
    document.getElementById('last-updated').textContent = `更新：${new Date(latest.updated_at).toLocaleTimeString('zh-HK')}`;
  } else {
    document.getElementById('last-updated').textContent = '未有數據';
  }

  try {
    const boot = await fetchFPL('bootstrap-static/');
    const teamCodeMap = {};
    (boot.teams || []).forEach(t => { teamCodeMap[t.id] = t.code; });
    (boot.elements || []).forEach(el => {
      elementData[el.id] = { name: el.web_name, pos: el.element_type, teamCode: teamCodeMap[el.team] || 0 };
    });
  } catch(e) {}

  renderWeekly(currentGW || latestGW);
  renderSummaryTable();
  renderCaptainTable();
  renderLastPlaceTable();
  renderWorstGWTable();
  renderH2HStandings();
  startAutoRefresh();
  preloadSquads(currentGW || latestGW);
}

async function preloadSquads(gw) {
  if (!gw) return;
  let liveData = null;
  try { liveData = await fetchFPL(`event/${gw}/live/`); } catch(e) { return; }
  const liveMap = {};
  (liveData.elements || []).forEach(e => { liveMap[e.id] = (e.stats && e.stats.total_points) || 0; });
  for (const name of PLAYER_ORDER) {
    const entryId = PLAYER_MAP[name];
    const cacheKey = `${entryId}_${gw}`;
    if (squadCache[cacheKey]) continue;
    try {
      const picksRes = await fetchFPL(`entry/${entryId}/event/${gw}/picks/`);
      squadCache[cacheKey] = { picks: picksRes.picks || [], liveMap };
    } catch(e) {}
    await new Promise(r => setTimeout(r, 200));
  }
}

function shirtImg(teamCode, isBench) {
  if (!teamCode) return `<span class="player-card-shirt-fallback">👕</span>`;
  const url = `https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${teamCode}${isBench ? '_1' : ''}-110.png`;
  return `<img src="${url}" onerror="this.parentNode.innerHTML='<span class=\\'player-card-shirt-fallback\\'>👕</span>'" alt="">`;
}

// multiplier: 2 (normal) or 3 (TC)
// usedVC: true = VC 被用做有效隊長
function buildSquadHTML(picks, liveMap, isBench, usedVC, multiplier, isBB) {
  return picks.map(p => {
    const el = elementData[p.element] || { name: `#${p.element}`, pos: 1, teamCode: 0 };
    const rawPts = liveMap[p.element] !== undefined ? liveMap[p.element] : null;
    const isCap = p.is_captain;
    const isVC = p.is_vice_captain;

    // 判斷呢個球員係咪有效隊長（要乘分）
    const isEffectiveCaptain = (!usedVC && isCap) || (usedVC && isVC);
    // 計算顯示分數：有效隊長乘 multiplier
    let displayPts;
    if (rawPts === null) {
      displayPts = '-';
    } else if (isEffectiveCaptain && !isBench) {
      displayPts = rawPts * multiplier;
    } else {
      displayPts = rawPts;
    }

    const ptsClass = displayPts === '-' ? '' : displayPts > 0 ? '' : displayPts < 0 ? 'negative' : 'zero';

    let cardClass = 'player-card';
    if (!usedVC && isCap) cardClass += ' is-captain';
    if (usedVC && isVC) cardClass += ' is-vc-active';
    if (isBench && !isBB) cardClass += ' is-bench';

    let badge = '';
    if (!usedVC && isCap) {
      badge = `<div class="player-card-badge">C</div>`;
    } else if (usedVC && isVC) {
      badge = `<div class="player-card-badge vc-badge-card">VC</div>`;
    }

    return `<div class="${cardClass}">
      ${badge}
      <div class="player-card-shirt">${shirtImg(el.teamCode, isBench && !isBB)}</div>
      <div class="player-card-name">${el.name}</div>
      <div class="player-card-pts ${ptsClass}">${displayPts}</div>
    </div>`;
  }).join('');
}

async function toggleSquad(entryId, gw, usedVC) {
  const squadRowId = `squad-${entryId}`;
  const existingRow = document.getElementById(squadRowId);
  const dataRow = document.querySelector(`tr.data-row[data-entry="${entryId}"]`);

  if (existingRow) {
    existingRow.remove();
    if (dataRow) dataRow.classList.remove('expanded');
    return;
  }

  if (dataRow) dataRow.classList.add('expanded');
  const colCount = dataRow ? dataRow.cells.length : 12;
  const squadRow = document.createElement('tr');
  squadRow.id = squadRowId;
  squadRow.className = 'squad-row';

  const cacheKey = `${entryId}_${gw}`;

  // 從 cap_log 拎 chip 判斷 multiplier
  const capEntry = allCapLog.find(c => Number(c.entry_id) === Number(entryId) && c.gw === gw);
  const chipRaw = capEntry ? (capEntry.chip || '') : '';
  const multiplier = CHIP_TC_KEYS.includes(chipRaw) ? 3 : 2;

  const isBB = chipRaw === 'bboost';

  function renderSquadContent(picks, liveMap) {
    const starters = picks.filter(p => p.position <= 11);
    const bench = picks.filter(p => p.position > 11);
    return `
      <div class="squad-desktop">
        <div class="squad-section-label">正選</div>
        <div class="squad-grid">${buildSquadHTML(starters, liveMap, false, usedVC, multiplier, isBB)}</div>
        <div class="squad-section-label">後備</div>
        <div class="squad-grid">${buildSquadHTML(bench, liveMap, true, usedVC, multiplier, isBB)}</div>
      </div>
      <div class="squad-mobile">
        <div class="squad-grid">${buildSquadHTML(starters, liveMap, false, usedVC, multiplier, isBB)}${buildSquadHTML(bench, liveMap, true, usedVC, multiplier, isBB)}</div>
      </div>
    `;
  }

  if (squadCache[cacheKey]) {
    const { picks, liveMap } = squadCache[cacheKey];
    squadRow.innerHTML = `<td colspan="${colCount}"><div class="squad-container">${renderSquadContent(picks, liveMap)}</div></td>`;
    if (dataRow) dataRow.insertAdjacentElement('afterend', squadRow);
  } else {
    squadRow.innerHTML = `<td colspan="${colCount}"><div class="squad-container"><div class="squad-loading">⏳ 載入陣容...</div></div></td>`;
    if (dataRow) dataRow.insertAdjacentElement('afterend', squadRow);
    try {
      const [picksRes, liveRes] = await Promise.all([
        fetchFPL(`entry/${entryId}/event/${gw}/picks/`),
        fetchFPL(`event/${gw}/live/`)
      ]);
      const liveMap = {};
      (liveRes.elements || []).forEach(e => { liveMap[e.id] = (e.stats && e.stats.total_points) || 0; });
      const picks = picksRes.picks || [];
      squadCache[cacheKey] = { picks, liveMap };
      squadRow.querySelector('.squad-container').innerHTML = renderSquadContent(picks, liveMap);
    } catch(e) {
      squadRow.querySelector('.squad-container').innerHTML = `<div class="squad-loading">❌ 載入失敗</div>`;
    }
  }
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  refreshCountdown = 300;
  autoRefreshTimer = setInterval(async () => {
    refreshCountdown--;
    if (refreshCountdown <= 0) {
      document.getElementById('refresh-indicator').textContent = '🔄';
      await loadData();
      refreshCountdown = 300;
    } else {
      document.getElementById('refresh-indicator').textContent = `⏱ ${refreshCountdown}s`;
    }
  }, 1000);
}

function showPlayerChart(playerName) {
  currentModalPlayer = playerName;
  document.getElementById('modal-player-name').textContent = playerName;
  document.getElementById('player-modal').classList.add('active');
  renderModalChart(playerName, currentModalTab);
}

function closeModal(event) {
  if (event.target === document.getElementById('player-modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('player-modal').classList.remove('active');
  if (modalChart) { modalChart.destroy(); modalChart = null; }
}

function switchModalTab(tab) {
  currentModalTab = tab;
  document.querySelectorAll('.modal-tab').forEach((t, i) => {
    t.classList.toggle('active', ['penalty','rank'][i] === tab);
  });
  if (currentModalPlayer) renderModalChart(currentModalPlayer, tab);
}

function renderModalChart(playerName, tab) {
  const gws = [...new Set(allResults.map(r => r.gw))].sort((a,b) => a-b);
  const labels = gws.map(g => `GW${g}`);
  const color = PLAYER_COLORS[PLAYER_ORDER.indexOf(playerName)] || '#58a6ff';
  let data, label;
  if (tab === 'penalty') {
    data = gws.map(gw => { const r = allResults.find(r => r.player_name === playerName && r.gw === gw); return r ? Math.abs(r.cumul_penalty) : null; });
    label = '累積罰款';
  } else {
    data = gws.map(gw => {
      const gwData = allResults.filter(r => r.gw === gw).sort((a,b) => b.cumul_net_points - a.cumul_net_points);
      const idx = gwData.findIndex(r => r.player_name === playerName);
      return idx >= 0 ? 9 - (idx + 1) : null;
    });
    label = '累積總分排名';
  }
  const cs = getComputedStyle(document.body);
  const tickColor = cs.getPropertyValue('--text-secondary').trim();
  const gridColor = cs.getPropertyValue('--border-inner').trim();
  if (modalChart) { modalChart.destroy(); modalChart = null; }
  modalChart = new Chart(document.getElementById('modal-chart'), {
    type: 'line',
    data: { labels, datasets: [{ label, data, borderColor: color, backgroundColor: color + '30', tension: 0.3, pointRadius: 4, borderWidth: 2, fill: true }] },
    options: {
      responsive: true, plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: tickColor, font: { size: 11 } }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor, font: { size: 11 }, callback: v => tab === 'penalty' ? `$${v}` : `第${9-v}名` }, grid: { color: gridColor }, reverse: false, min: tab === 'rank' ? 1 : undefined, max: tab === 'rank' ? 8 : undefined }
      }
    }
  });
}

function renderWeekly(gw) {
  if (!gw) return;
  currentGW = gw;
  document.getElementById('weekly-title').textContent = `GW${gw} 詳情`;

  const gwTotals = [...new Set(allResults.map(r => r.gw))].map(g => {
    const d = allResults.filter(r => r.gw === g);
    return { gw: g, total: d.reduce((s,r) => s + Math.abs(r.total_penalty), 0) };
  }).sort((a,b) => b.total - a.total);
  if (gwTotals.length && gwTotals[0].gw === gw) {
    document.getElementById('worst-gw-badge').style.display = 'inline';
    document.getElementById('worst-gw-badge').textContent = '💀 最衰周';
  } else {
    document.getElementById('worst-gw-badge').style.display = 'none';
  }

  const gwResults = allResults.filter(r => r.gw === gw);
  const caps = allCapLog.filter(r => r.gw === gw);
  if (!gwResults.length) { document.getElementById('weekly-table').innerHTML = '<div class="loading">未有數據</div>'; return; }

  const minPts = Math.min(...gwResults.map(r => r.gross_points));

  // 排名永遠按累積總分
  const ranked = [...gwResults].sort((a,b) => b.cumul_net_points - a.cumul_net_points);
  const rankMap = {};
  ranked.forEach((r, i) => { rankMap[r.player_name] = i + 1; });

  // 上周排名
  const prevGWResults = allResults.filter(r => r.gw === gw - 1);
  const prevRanks = {};
  if (prevGWResults.length) {
    [...prevGWResults].sort((a,b) => b.cumul_net_points - a.cumul_net_points).forEach((r, i) => {
      prevRanks[r.player_name] = i + 1;
    });
  }

  // 顯示排序
  const sortKey = currentSort.key;
  const sortDir = currentSort.dir;
  const data = [...gwResults].sort((a,b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortDir === 'asc' ? va - vb : vb - va;
  });

  const sortArrow = (key) => {
    if (currentSort.key !== key) return '';
    return `<span class="sort-arrow">${currentSort.dir === 'asc' ? '▲' : '▼'}</span>`;
  };

  const tableEl = document.createElement('table');
  const thead = document.createElement('tr');
  const cols = [
    { label: '玩家', mobLabel: '玩家', key: 'player_name', cls: '' },
    { label: '今周分', mobLabel: 'PT', key: 'gross_points', cls: '' },
    { label: 'League罰款', mobLabel: '', key: 'league_penalty', cls: 'desk-only' },
    { label: 'H2H罰款', mobLabel: '', key: 'h2h_penalty', cls: 'desk-only' },
    { label: '今周$$$$', mobLabel: '$$$', key: 'total_penalty', cls: 'col-important' },
    { label: '累積罰款', mobLabel: 'Total', key: 'cumul_penalty', cls: 'col-important' },
    { label: '累積總分', mobLabel: '', key: 'cumul_net_points', cls: 'col-important desk-only' },
    { label: '隊長', mobLabel: '', key: null, cls: 'desk-only' },
    { label: '今周Cap分', mobLabel: '', key: null, cls: 'desk-only' },
    { label: '累積Cap分', mobLabel: '', key: null, cls: 'desk-only' },
    { label: '成功率', mobLabel: '', key: null, cls: 'desk-only' },
    { label: 'Chip', mobLabel: '', key: null, cls: 'desk-only' }
  ];
  cols.forEach(col => {
    const th = document.createElement('th');
    th.className = col.cls + (col.key ? ' sortable' : '');
    if (col.mobLabel && col.mobLabel !== col.label) {
      th.innerHTML = `<span class="desk-label">${col.label}</span><span class="mob-label">${col.mobLabel}</span>${sortArrow(col.key)}`;
    } else {
      th.innerHTML = `${col.label}${sortArrow(col.key)}`;
    }
    if (col.key) {
      th.addEventListener('click', () => {
        if (currentSort.key === col.key) currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
        else { currentSort.key = col.key; currentSort.dir = 'desc'; }
        renderWeekly(gw);
      });
    }
    thead.appendChild(th);
  });
  tableEl.appendChild(thead);

  data.forEach(r => {
    const rank = rankMap[r.player_name];
    const cap = caps.find(c => Number(c.entry_id) === Number(r.entry_id));
    const isLast = r.gross_points === minPts;
    const isLow = r.gross_points < 45 && !isLast;
    const entryId = PLAYER_MAP[r.player_name];

    let moveHtml = '';
    if (prevRanks[r.player_name]) {
      const diff = prevRanks[r.player_name] - rank;
      if (diff > 0) moveHtml = `<span class="move-up">▲</span>`;
      else if (diff < 0) moveHtml = `<span class="move-down">▼</span>`;
      else moveHtml = `<span class="move-same">🔵</span>`;
    }

    const usedVC = cap && cap.captain && cap.captain.includes('(VC)');
    const capDisplayName = cap ? cap.captain.replace(' (VC)', '') : '-';
    const chip = cap ? (CHIP_DISPLAY[cap.chip] || '') : '';
    const chipHtml = chip ? `<span class="chip-badge mob-only">${chip}</span>` : '';
    const capPts = cap ? cap.captain_pts : '-';
    const capOK = cap ? cap.cap_ok : null;

    let capNameHtml = '-';
    if (cap) {
      const colorClass = capOK === 1 ? 'cap-ok' : 'cap-fail';
      const vcLabel = usedVC ? '<span class="vc-badge">(VC)</span>' : '';
      capNameHtml = `<span class="${colorClass}">${capDisplayName}${vcLabel}</span>`;
    }

    const allCapsForPlayer = allCapLog.filter(c => c.player_name === r.player_name && c.gw <= gw);
    const ok = allCapsForPlayer.filter(c => c.cap_ok === 1).length;
    const total = allCapsForPlayer.length;
    const rate = total > 0 ? (ok/total*100).toFixed(0) + '%' : '-';
    const cumulCapPts = allCapsForPlayer.reduce((s,c) => s + (c.captain_pts || 0), 0);
    const fmt = v => v === 0 ? '$0' : `$${Math.abs(v)}`;

    const tr = document.createElement('tr');
    tr.className = `data-row${isLast ? ' last-place' : isLow ? ' low-score' : ''}`;
    tr.dataset.entry = entryId;
    tr.dataset.gw = gw;
    tr.innerHTML = `
      <td>${moveHtml}<span class="rank-inline">${rank}</span><strong class="player-link" data-name="${r.player_name}">${r.player_name}</strong>${chipHtml}</td>
      <td>${r.gross_points}</td>
      <td class="desk-only">${fmt(r.league_penalty)}</td>
      <td class="desk-only">${fmt(r.h2h_penalty)}</td>
      <td class="col-important">${fmt(r.total_penalty)}</td>
      <td class="col-important">${fmt(r.cumul_penalty)}</td>
      <td class="col-important desk-only">${r.cumul_net_points}</td>
      <td class="desk-only">${capNameHtml}</td>
      <td class="desk-only">${capPts}</td>
      <td class="desk-only">${cumulCapPts}</td>
      <td class="desk-only">${rate}</td>
      <td class="desk-only">${chip}</td>
    `;

    tr.querySelector('.player-link').addEventListener('click', e => {
      e.stopPropagation();
      showPlayerChart(r.player_name);
    });
    tr.addEventListener('click', () => toggleSquad(entryId, gw, usedVC));
    tableEl.appendChild(tr);
  });

  const totalPool = gwResults.reduce((s,r) => s + Math.abs(r.cumul_penalty), 0);
  const wrapper = document.getElementById('weekly-table');
  wrapper.innerHTML = '';
  wrapper.appendChild(tableEl);
  const footer = document.createElement('div');
  footer.className = 'pool-footer';
  footer.innerHTML = `💰 截至 GW${gw} 全體累積罰款：<strong style="color:var(--accent-red);font-size:15px;">$${totalPool}</strong>`;
  wrapper.appendChild(footer);
  renderH2HMatches(gw);
}

function renderSummaryTable() {
  const data = PLAYER_ORDER.map(name => {
    const rows = allResults.filter(r => r.player_name === name).sort((a,b) => b.gw - a.gw);
    const latest = rows[0];
    return { name, penalty: latest ? latest.cumul_penalty : 0, pts: latest ? latest.cumul_net_points : 0 };
  }).sort((a,b) => a.penalty - b.penalty);
  if (!data.some(d => d.pts > 0)) { document.getElementById('summary-table').innerHTML = '<div class="loading">未有數據</div>'; return; }
  const totalPool = data.reduce((s,p) => s + Math.abs(p.penalty), 0);
  let html = '<table><tr><th>#</th><th>玩家</th><th class="col-important">累積罰款</th><th class="col-important">累積總分</th></tr>';
  data.forEach((p, i) => {
    html += `<tr><td class="rank-num">${i+1}</td>
      <td><strong class="player-link" data-name="${p.name}" onclick="showPlayerChart(this.dataset.name)">${p.name}</strong></td>
      <td class="col-important">${p.penalty < 0 ? `$${Math.abs(p.penalty)}` : '$0'}</td>
      <td class="col-important">${p.pts}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('summary-table').innerHTML = html;
  const footer = document.createElement('div');
  footer.className = 'pool-footer';
  footer.innerHTML = `💰 全季累積罰款總額：<strong style="color:var(--accent-red);font-size:15px;">$${totalPool}</strong>`;
  document.getElementById('summary-table').appendChild(footer);
}

function renderCaptainTable() {
  const data = PLAYER_ORDER.map(name => {
    const caps = allCapLog.filter(r => r.player_name === name);
    const total = caps.length;
    const ok = caps.filter(c => c.cap_ok === 1).length;
    const totalPts = caps.reduce((s,c) => s + (c.captain_pts || 0), 0);
    return { name, totalPts, ok, total, rate: total > 0 ? (ok/total*100).toFixed(0) : 0 };
  }).sort((a,b) => b.totalPts - a.totalPts);
  if (!data.some(d => d.total > 0)) { document.getElementById('captain-table').innerHTML = '<div class="loading">未有數據</div>'; return; }
  let html = '<table><tr><th>#</th><th>玩家</th><th class="col-important">Cap 總分</th><th>成功率</th></tr>';
  data.forEach((p, i) => {
    html += `<tr><td class="rank-num">${i+1}</td><td><strong>${p.name}</strong></td>
      <td class="col-important"><strong>${p.totalPts}</strong></td>
      <td>${p.rate}% (${p.ok}/${p.total})</td></tr>`;
  });
  html += '</table>';
  document.getElementById('captain-table').innerHTML = html;
}

function renderLastPlaceTable() {
  const gws = [...new Set(allResults.map(r => r.gw))].sort((a,b) => a-b);
  const cnt = {};
  PLAYER_ORDER.forEach(n => cnt[n] = 0);
  gws.forEach(gw => {
    const d = allResults.filter(r => r.gw === gw);
    if (!d.length) return;
    const min = Math.min(...d.map(r => r.gross_points));
    d.filter(r => r.gross_points === min).forEach(r => { if (cnt[r.player_name] !== undefined) cnt[r.player_name]++; });
  });
  const data = PLAYER_ORDER.map(n => ({ name: n, count: cnt[n] || 0 })).sort((a,b) => b.count - a.count);
  let html = '<table><tr><th>#</th><th>玩家</th><th>包尾次數</th></tr>';
  data.forEach((p, i) => {
    html += `<tr><td class="rank-num">${i+1}</td><td><strong>${p.name}</strong></td><td>${p.count} 次</td></tr>`;
  });
  html += '</table>';
  document.getElementById('lastplace-table').innerHTML = html;
}

function renderWorstGWTable() {
  const gws = [...new Set(allResults.map(r => r.gw))].sort((a,b) => a-b);
  const d = gws.map(gw => {
    const gwData = allResults.filter(r => r.gw === gw);
    return { gw, totalPenalty: gwData.reduce((s,r) => s + Math.abs(r.total_penalty), 0), playerCount: gwData.filter(r => r.total_penalty < 0).length };
  }).sort((a,b) => b.totalPenalty - a.totalPenalty);
  if (!d.length) { document.getElementById('worstgw-table').innerHTML = '<div class="loading">未有數據</div>'; return; }
  let html = '<table><tr><th>#</th><th>GW</th><th>總罰款</th><th>受罰人數</th></tr>';
  d.slice(0, 10).forEach((g, i) => {
    html += `<tr ${i === 0 ? 'style="background:var(--worst-row-bg)"' : ''}>
      <td class="rank-num">${i+1}${i === 0 ? ' 💀' : ''}</td>
      <td><strong>GW${g.gw}</strong></td><td>$${g.totalPenalty}</td><td>${g.playerCount} 人</td></tr>`;
  });
  html += '</table>';
  document.getElementById('worstgw-table').innerHTML = html;
}

const ENTRY_TO_NAME = {};
Object.entries(PLAYER_MAP).forEach(([name, id]) => { ENTRY_TO_NAME[id] = name; });

async function renderH2HMatches(gw) {
  const container = document.getElementById('h2h-matches');
  container.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const h2hRes = await fetchFPL(`leagues-h2h-matches/league/${LEAGUE_ID}/?event=${gw}`);
    const matches = h2hRes.results || [];
    if (!matches.length) { container.innerHTML = '<div class="loading">未有數據</div>'; return; }
    let html = '<div class="h2h-list">';
    matches.forEach(m => {
      const name1 = m.entry_1_player_name || ENTRY_TO_NAME[m.entry_1_entry] || '?';
      const team1 = ENTRY_TO_NAME[m.entry_1_entry] || m.entry_1_name || '';
      const name2 = m.entry_2_player_name || ENTRY_TO_NAME[m.entry_2_entry] || '?';
      const team2 = ENTRY_TO_NAME[m.entry_2_entry] || m.entry_2_name || '';
      const pts1 = m.entry_1_points;
      const pts2 = m.entry_2_points;
      let cls1 = 'draw', cls2 = 'draw';
      if (pts1 > pts2) { cls1 = 'win'; cls2 = 'lose'; }
      else if (pts2 > pts1) { cls1 = 'lose'; cls2 = 'win'; }
      html += `<div class="h2h-row">
        <div class="h2h-side left">
          <div class="h2h-side-name">${name1}</div>
          <div class="h2h-side-team">${team1}</div>
        </div>
        <div class="h2h-scores">
          <div class="h2h-score-box ${cls1}">${pts1}</div>
          <div class="h2h-score-box ${cls2}">${pts2}</div>
        </div>
        <div class="h2h-side right">
          <div class="h2h-side-name">${name2}</div>
          <div class="h2h-side-team">${team2}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="loading">載入失敗</div>';
  }
}

async function renderH2HStandings() {
  const container = document.getElementById('h2h-standings');
  container.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetchFPL(`leagues-h2h/${LEAGUE_ID}/standings/`);
    const standings = (res.standings && res.standings.results) || (res.results) || [];
    if (!standings.length) { container.innerHTML = '<div class="loading">未有數據</div>'; return; }
    let html = '<table><tr><th>#</th><th>玩家</th><th>勝</th><th>和</th><th>負</th><th class="col-important">積分</th></tr>';
    standings.forEach((s, i) => {
      const name = ENTRY_TO_NAME[s.entry] || ENTRY_TO_NAME[s.entry_id] || s.entry_name || s.player_name || '?';
      html += `<tr>
        <td class="rank-num">${s.rank || i + 1}</td>
        <td><strong>${name}</strong></td>
        <td style="color:var(--accent-green)">${s.matches_won}</td>
        <td>${s.matches_drawn}</td>
        <td style="color:var(--accent-red)">${s.matches_lost}</td>
        <td class="col-important">${s.total}</td>
      </tr>`;
    });
    html += '</table>';
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="loading">載入失敗</div>';
  }
}

function switchView(view) {
  ['weekly','summary'].forEach(v => { document.getElementById(`view-${v}`).style.display = v === view ? 'block' : 'none'; });
  document.querySelectorAll('.nav-tab').forEach((tab, i) => { tab.classList.toggle('active', ['weekly','summary'][i] === view); });
}

function onGWSelect() {
  const gw = parseInt(document.getElementById('gw-select').value);
  if (gw) renderWeekly(gw);
}

function toggleAdmin() {
  const p = document.getElementById('admin-panel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function checkPwd() {
  if (document.getElementById('admin-password').value !== ADMIN_PASSWORD) { setStatus('❌ 密碼錯誤', 'err'); return false; }
  return true;
}

function setAllDisabled(v) {
  ['update-btn','latest-btn','batch-btn'].forEach(id => document.getElementById(id).disabled = v);
}

async function updateGW() {
  if (!checkPwd()) return;
  const gw = parseInt(document.getElementById('gw-input').value);
  if (!gw || gw < 1 || gw > 38) { setStatus('❌ 請輸入有效 GW', 'err'); return; }
  setAllDisabled(true); setStatus(`⏳ 更新 GW${gw}...`, '');
  try { await runUpdate(gw); setStatus(`✅ GW${gw} 完成！`, 'ok'); }
  catch(e) { setStatus('❌ ' + e.message, 'err'); }
  setAllDisabled(false);
}

async function updateLatest() {
  if (!checkPwd()) return;
  setAllDisabled(true); setStatus('🔄 拎緊當前 GW...', '');
  try {
    const boot = await fetchFPL('bootstrap-static/');
    let gw = 0;
    boot.events.forEach(e => { if (e.is_current) gw = e.id; });
    if (!gw) boot.events.forEach(e => { if (e.finished && e.id > gw) gw = e.id; });
    if (!gw) { setStatus('❌ 搵唔到當前 GW', 'err'); setAllDisabled(false); return; }
    await runUpdate(gw); setStatus(`✅ GW${gw} 完成！`, 'ok');
  } catch(e) { setStatus('❌ ' + e.message, 'err'); }
  setAllDisabled(false);
}

async function batchUpdate() {
  if (!checkPwd()) return;
  const from = parseInt(document.getElementById('batch-from').value);
  const to = parseInt(document.getElementById('batch-to').value);
  if (!from || !to || from > to) { setStatus('❌ GW 範圍無效', 'err'); return; }
  if (to - from >= 8) { setStatus('❌ 每次最多 8 個 GW', 'err'); return; }
  setAllDisabled(true);
  for (let gw = from; gw <= to; gw++) {
    setStatus(`⏳ GW${gw}...（${gw-from+1}/${to-from+1}）`, '');
    try { await runUpdate(gw); } catch(e) { setStatus(`❌ GW${gw} 出錯：${e.message}`, 'err'); }
    await new Promise(r => setTimeout(r, 1000));
  }
  setStatus(`✅ GW${from}–${to} 完成！`, 'ok');
  setAllDisabled(false);
}

function resolveEffectiveCaptain(capEl, vcEl, liveData, rawChip, teamMatchStatus, elementTeam) {
  const isTC = CHIP_TC_KEYS.includes(rawChip);
  if (isTC) return { el: capEl, multiplier: 3, usedVC: false };
  const capMins = (liveData[capEl] && liveData[capEl].minutes) || 0;
  const capTeam = elementTeam[capEl];
  const capStatus = capTeam ? (teamMatchStatus[capTeam] || { noFixture: true }) : { noFixture: true };
  if (capMins === 0 && (capStatus.noFixture || capStatus.kickedOff) && vcEl) return { el: vcEl, multiplier: 2, usedVC: true };
  return { el: capEl, multiplier: 2, usedVC: false };
}

async function runUpdate(gw) {
  const [h2hRes, bootRes, liveRes, fixtureRes] = await Promise.all([
    fetchFPL(`leagues-h2h-matches/league/${LEAGUE_ID}/?event=${gw}`),
    fetchFPL('bootstrap-static/'), fetchFPL(`event/${gw}/live/`), fetchFPL(`fixtures/?event=${gw}`)
  ]);
  const netByEntry = {};
  (h2hRes.results || []).forEach(m => { netByEntry[m.entry_1_entry] = m.entry_1_points; netByEntry[m.entry_2_entry] = m.entry_2_points; });
  const elementName = {}, elementTeam = {};
  (bootRes.elements || []).forEach(el => { elementName[el.id] = el.web_name; elementTeam[el.id] = el.team; });
  const liveData = {};
  (liveRes.elements || []).forEach(e => { liveData[e.id] = { points: (e.stats && e.stats.total_points) || 0, minutes: (e.stats && e.stats.minutes) || 0 }; });
  const now = new Date();
  const teamMatchStatus = {};
  (fixtureRes || []).forEach(f => {
    if (!f.kickoff_time) return;
    const mins = (now - new Date(f.kickoff_time)) / 60000;
    const s = { kickedOff: mins >= 20, finished: f.finished || false, noFixture: false };
    teamMatchStatus[f.team_h] = s; teamMatchStatus[f.team_a] = s;
  });
  const picksData = await Promise.all(Object.keys(PLAYER_MAP).map(async name => {
    try { return { name, entryId: PLAYER_MAP[name], data: await fetchFPL(`entry/${PLAYER_MAP[name]}/event/${gw}/picks/`) }; }
    catch(e) { return { name, entryId: PLAYER_MAP[name], data: null }; }
  }));
  const grossByEntry = {}, capElByEntry = {}, vcElByEntry = {}, rawChipByEntry = {};
  picksData.forEach(({ entryId, data }) => {
    if (!data || !data.entry_history) return;
    const net = netByEntry[entryId];
    if (typeof net === 'number') grossByEntry[entryId] = net + (data.entry_history.event_transfers_cost || 0);
    const cap = (data.picks || []).find(p => p.is_captain);
    const vc = (data.picks || []).find(p => p.is_vice_captain);
    if (cap) capElByEntry[entryId] = cap.element;
    if (vc) vcElByEntry[entryId] = vc.element;
    rawChipByEntry[entryId] = data.active_chip || '';
  });
  const grossArr = Object.values(grossByEntry).filter(v => typeof v === 'number');
  const minGross = grossArr.length ? Math.min(...grossArr) : -1;
  const prevResults = await supabaseGet('weekly_results', `?gw=eq.${gw - 1}`);
  const prevByEntry = {};
  if (Array.isArray(prevResults)) prevResults.forEach(r => { prevByEntry[Number(r.entry_id)] = r; });
  const weeklyRows = [], capRows = [];
  for (const { name, entryId } of picksData) {
    const gross = grossByEntry[entryId], net = netByEntry[entryId];
    if (typeof gross !== 'number' || typeof net !== 'number') continue;
    const lp = (gross < 45 ? -20 : 0) + (gross === minGross ? -20 : 0);
    const h2hp = calcH2H(h2hRes.results || [], entryId);
    const prev = prevByEntry[Number(entryId)];
    weeklyRows.push({
      gw, player_name: name, entry_id: entryId, gross_points: gross, net_points: net,
      league_penalty: lp, h2h_penalty: h2hp, total_penalty: lp + h2hp,
      cumul_penalty: (prev ? prev.cumul_penalty : 0) + lp + h2hp,
      cumul_net_points: (prev ? prev.cumul_net_points : 0) + net,
      updated_at: new Date().toISOString()
    });
    const capEl = capElByEntry[entryId], vcEl = vcElByEntry[entryId];
    const rawChip = rawChipByEntry[entryId] || '';
    if (capEl) {
      const eff = resolveEffectiveCaptain(capEl, vcEl, liveData, rawChip, teamMatchStatus, elementTeam);
      const rawPts = (liveData[eff.el] && liveData[eff.el].points) || 0;
      capRows.push({
        gw, player_name: name, entry_id: entryId,
        captain: (elementName[eff.el] || eff.el) + (eff.usedVC ? ' (VC)' : ''),
        captain_pts: rawPts * eff.multiplier,
        cap_ok: rawPts >= 4 ? 1 : 0,
        chip: rawChip, updated_at: new Date().toISOString()
      });
    }
  }
  await supabaseUpsert('weekly_results', weeklyRows);
  await supabaseUpsert('cap_log', capRows);
  await loadData();
}

function calcH2H(matches, entryId) {
  for (const m of matches) {
    if (m.entry_1_entry === entryId) return m.entry_1_points < m.entry_2_points ? -20 : 0;
    if (m.entry_2_entry === entryId) return m.entry_2_points < m.entry_1_points ? -20 : 0;
  }
  return 0;
}

function setStatus(msg, type) {
  const el = document.getElementById('admin-status');
  el.textContent = msg; el.className = 'status-msg ' + type;
}


function toggleTheme() {
  const body = document.body;
  const isLight = body.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? '☀️ Light' : '🌙 Dark';
  localStorage.setItem('fpl-theme', isLight ? 'light' : 'dark');
}
(function() {
  if (localStorage.getItem('fpl-theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-toggle').textContent = '☀️ Light';
  }
})();

loadData();
</script>
