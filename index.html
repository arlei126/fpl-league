<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽️ FPL 罰款計數機</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; color: #58a6ff; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .last-updated { color: #8b949e; font-size: 12px; }
  .admin-toggle { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .gw-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .gw-bar-label { color: #8b949e; font-size: 13px; white-space: nowrap; }
  .gw-select { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .back-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .back-btn:hover { background: #30363d; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
  .card-title { padding: 12px 16px; background: #1c2128; font-size: 14px; font-weight: 600; color: #58a6ff; border-bottom: 1px solid #30363d; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 14px; text-align: left; font-size: 12px; color: #8b949e; font-weight: 500; background: #1c2128; }
  td { padding: 10px 14px; border-top: 1px solid #21262d; font-size: 13px; }
  tr:hover td { background: #1c2128; }
  .penalty { color: #f85149; font-weight: 600; }
  .green { color: #3fb950; font-weight: 600; }
  .last-place td { background: #2d1515 !important; }
  .low-score td { background: #2d2b10 !important; }
  .rank-num { color: #8b949e; }
  .vc-badge { color: #f0883e; font-size: 11px; margin-left: 3px; }
  .admin-panel { display: none; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .admin-panel.active { display: block; }
  .admin-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .admin-input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 7px 12px; border-radius: 6px; font-size: 13px; }
  .btn-green { background: #238636; border: 1px solid #2ea043; color: #fff; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-green:hover { background: #2ea043; }
  .btn-green:disabled { background: #21262d; border-color: #30363d; color: #8b949e; cursor: not-allowed; }
  .status-msg { font-size: 13px; margin-top: 8px; color: #8b949e; }
  .status-msg.ok { color: #3fb950; }
  .status-msg.err { color: #f85149; }
  .admin-section-label { color: #8b949e; font-size: 12px; margin-bottom: 6px; }
  .divider { border-top: 1px solid #30363d; margin: 14px 0; }
  .loading { padding: 40px; text-align: center; color: #8b949e; }
  .overflow-x { overflow-x: auto; }
</style>
</head>
<body>

<div class="header">
  <h1>⚽️ FPL 罰款計數機</h1>
  <div class="header-right">
    <span class="last-updated" id="last-updated">載入中...</span>
    <button class="admin-toggle" onclick="toggleAdmin()">🔧 更新</button>
  </div>
</div>

<div class="container">

  <div class="admin-panel" id="admin-panel">
    <div class="admin-section-label">密碼</div>
    <div class="admin-row">
      <input type="password" class="admin-input" id="admin-password" placeholder="密碼" style="width:150px">
    </div>
    <div class="admin-section-label">單周更新</div>
    <div class="admin-row">
      <input type="number" class="admin-input" id="gw-input" placeholder="GW" min="1" max="38" style="width:80px">
      <button class="btn-green" onclick="updateGW()" id="update-btn">⚡️ 指定 GW</button>
      <button class="btn-green" onclick="updateLatest()" id="latest-btn">🔄 最新 GW</button>
    </div>
    <div class="divider"></div>
    <div class="admin-section-label">批量補跑（每次最多 8 個 GW）</div>
    <div class="admin-row">
      <input type="number" class="admin-input" id="batch-from" placeholder="由" min="1" max="38" style="width:70px">
      <span style="color:#8b949e">–</span>
      <input type="number" class="admin-input" id="batch-to" placeholder="至" min="1" max="38" style="width:70px">
      <button class="btn-green" onclick="batchUpdate()" id="batch-btn">📦 批量跑</button>
    </div>
    <div class="status-msg" id="admin-status"></div>
  </div>

  <div class="gw-bar" id="gw-bar" style="display:none">
    <span class="gw-bar-label">睇指定周：</span>
    <select class="gw-select" id="gw-select" onchange="onGWSelect()">
      <option value="">-- 揀 GW --</option>
    </select>
    <button class="back-btn" id="back-btn" onclick="showSummary()" style="display:none">← 返回總覽</button>
  </div>

  <div id="summary-view">
    <div class="grid">
      <div class="card">
        <div class="card-title">💰 全季罰款排行</div>
        <div id="summary-table"><div class="loading">載入中...</div></div>
      </div>
      <div class="card">
        <div class="card-title">👑 隊長總得分排行</div>
        <div id="captain-table"><div class="loading">載入中...</div></div>
      </div>
    </div>
  </div>

  <div id="weekly-view" style="display:none">
    <div class="card">
      <div class="card-title" id="weekly-title">GW 詳情</div>
      <div class="overflow-x">
        <div id="weekly-table"><div class="loading">載入中...</div></div>
      </div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://ucwsinzfpvjzdeqncjqc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjd3NpbnpmcHZqemRlcW5janFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNzAzODUsImV4cCI6MjA4OTc0NjM4NX0.CncnodPpTasZlOaw4ueZDyM4lSdxkOe51PkJ1DtHOZY';
const ADMIN_PASSWORD = 'fpl2024';
const LEAGUE_ID = 1406714;
const PLAYER_MAP = {
  "lai's_dream": 3818341, "Legend Son": 879948, "叒cap撚錯人": 10037,
  "達蛇的最後探戈": 901186, "和波照YEAH！": 1394163,
  "Arne slot lalalalala": 3775889, "利記海鮮": 5281742, "來都來了": 6297083
};
const CHIP_TC_KEYS = ['triple_captain', '3xc'];
const CHIP_DISPLAY = {
  'triple_captain': '👑 TC', '3xc': '👑 TC',
  'bboost': '🚀 BB', 'wildcard': '🔄 WC', 'freehit': '🆓 FH'
};

let allResults = [], allCapLog = [];

async function supabaseGet(table, query = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}

async function supabaseUpsert(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify(data)
  });
  return res.ok;
}

async function fetchFPL(path) {
  const res = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://fantasy.premierleague.com/api/' + path)}`);
  return res.json();
}

async function loadData() {
  allResults = await supabaseGet('weekly_results', '?order=gw.asc');
  allCapLog = await supabaseGet('cap_log', '?order=gw.asc');
  if (!Array.isArray(allResults)) allResults = [];
  if (!Array.isArray(allCapLog)) allCapLog = [];

  const gws = [...new Set(allResults.map(r => r.gw))].sort((a,b) => a-b);
  if (gws.length > 0) {
    const sel = document.getElementById('gw-select');
    sel.innerHTML = '<option value="">-- 揀 GW --</option>' + gws.map(g => `<option value="${g}">GW${g}</option>`).join('');
    document.getElementById('gw-bar').style.display = 'flex';
    const latest = allResults.reduce((a,b) => a.updated_at > b.updated_at ? a : b, allResults[0]);
    document.getElementById('last-updated').textContent = `最後更新：GW${gws[gws.length-1]} · ${new Date(latest.updated_at).toLocaleDateString('zh-HK')}`;
  } else {
    document.getElementById('last-updated').textContent = '未有數據';
  }
  renderSummaryTable();
  renderCaptainTable();
}

function renderSummaryTable() {
  const players = Object.keys(PLAYER_MAP);
  const data = players.map(name => {
    const rows = allResults.filter(r => r.player_name === name).sort((a,b) => b.gw - a.gw);
    const latest = rows[0];
    return { name, penalty: latest ? latest.cumul_penalty : 0, pts: latest ? latest.cumul_net_points : 0 };
  }).sort((a,b) => a.penalty - b.penalty);

  if (!data.some(d => d.pts > 0)) {
    document.getElementById('summary-table').innerHTML = '<div class="loading">未有數據</div>'; return;
  }
  let html = '<table><tr><th>#</th><th>玩家</th><th>累積罰款</th><th>累積總分</th></tr>';
  data.forEach((p, i) => {
    html += `<tr>
      <td class="rank-num">${i+1}</td>
      <td><strong>${p.name}</strong></td>
      <td class="${p.penalty < 0 ? 'penalty' : 'green'}">-$${Math.abs(p.penalty)}</td>
      <td>${p.pts}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('summary-table').innerHTML = html;
}

function renderCaptainTable() {
  const players = Object.keys(PLAYER_MAP);
  const data = players.map(name => {
    const caps = allCapLog.filter(r => r.player_name === name);
    const total = caps.length;
    const ok = caps.filter(c => c.cap_ok === 1).length;
    const totalPts = caps.reduce((s,c) => s + (c.captain_pts || 0), 0);
    return { name, totalPts, ok, total, rate: total > 0 ? (ok/total*100).toFixed(0) : 0 };
  }).sort((a,b) => b.totalPts - a.totalPts);

  if (!data.some(d => d.total > 0)) {
    document.getElementById('captain-table').innerHTML = '<div class="loading">未有數據</div>'; return;
  }
  let html = '<table><tr><th>#</th><th>玩家</th><th>Cap 總分</th><th>成功率</th></tr>';
  data.forEach((p, i) => {
    html += `<tr>
      <td class="rank-num">${i+1}</td>
      <td><strong>${p.name}</strong></td>
      <td><strong>${p.totalPts}</strong></td>
      <td>${p.rate}% (${p.ok}/${p.total})</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('captain-table').innerHTML = html;
}

function onGWSelect() {
  const gw = parseInt(document.getElementById('gw-select').value);
  if (!gw) { showSummary(); return; }
  showWeekly(gw);
}

function showWeekly(gw) {
  document.getElementById('summary-view').style.display = 'none';
  document.getElementById('weekly-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'inline-block';
  document.getElementById('weekly-title').textContent = `GW${gw} 詳情`;

  const data = allResults.filter(r => r.gw === gw).sort((a,b) => b.gross_points - a.gross_points);
  const caps = allCapLog.filter(r => r.gw === gw);
  if (!data.length) { document.getElementById('weekly-table').innerHTML = '<div class="loading">未有數據</div>'; return; }

  const minPts = Math.min(...data.map(r => r.gross_points));
  let html = '<table><tr><th>玩家</th><th>今周分</th><th>League罰款</th><th>H2H罰款</th><th>今周$$$$</th><th>累積罰款</th><th>累積總分</th><th>隊長</th><th>Cap分</th><th>成功率</th><th>Chip</th></tr>';

  data.forEach(r => {
    const cap = caps.find(c => c.entry_id === r.entry_id);
    const isLast = r.gross_points === minPts;
    const isLow = r.gross_points < 45 && !isLast;
    const rowClass = isLast ? 'last-place' : (isLow ? 'low-score' : '');
    const capName = cap ? cap.captain.replace(' (VC)', '') : '-';
    const isVC = cap && cap.captain.includes('(VC)');
    const chip = cap ? (CHIP_DISPLAY[cap.chip] || '') : '';
    const capPts = cap ? cap.captain_pts : '-';
    const allCapsForPlayer = allCapLog.filter(c => c.player_name === r.player_name && c.gw <= gw);
    const ok = allCapsForPlayer.filter(c => c.cap_ok === 1).length;
    const total = allCapsForPlayer.length;
    const rate = total > 0 ? (ok/total*100).toFixed(0) + '%' : '-';

    const fmtPenalty = v => v === 0 ? '<span class="green">$0</span>' : `<span class="penalty">-$${Math.abs(v)}</span>`;

    html += `<tr class="${rowClass}">
      <td><strong>${r.player_name}</strong></td>
      <td>${r.gross_points}</td>
      <td>${fmtPenalty(r.league_penalty)}</td>
      <td>${fmtPenalty(r.h2h_penalty)}</td>
      <td>${fmtPenalty(r.total_penalty)}</td>
      <td class="${r.cumul_penalty < 0 ? 'penalty' : 'green'}">-$${Math.abs(r.cumul_penalty)}</td>
      <td>${r.cumul_net_points}</td>
      <td>${capName}${isVC ? '<span class="vc-badge">(VC)</span>' : ''}</td>
      <td>${capPts}</td>
      <td>${rate}</td>
      <td>${chip}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('weekly-table').innerHTML = html;
}

function showSummary() {
  document.getElementById('summary-view').style.display = 'block';
  document.getElementById('weekly-view').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('gw-select').value = '';
}

function toggleAdmin() {
  const panel = document.getElementById('admin-panel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function checkPwd() {
  if (document.getElementById('admin-password').value !== ADMIN_PASSWORD) {
    setStatus('❌ 密碼錯誤', 'err'); return false;
  }
  return true;
}

function setAllDisabled(v) {
  ['update-btn','latest-btn','batch-btn'].forEach(id => document.getElementById(id).disabled = v);
}

async function updateGW() {
  if (!checkPwd()) return;
  const gw = parseInt(document.getElementById('gw-input').value);
  if (!gw || gw < 1 || gw > 38) { setStatus('❌ 請輸入有效 GW', 'err'); return; }
  setAllDisabled(true);
  setStatus(`⏳ 更新 GW${gw}...`, '');
  try { await runUpdate(gw); setStatus(`✅ GW${gw} 完成！`, 'ok'); }
  catch(e) { setStatus('❌ ' + e.message, 'err'); }
  setAllDisabled(false);
}

async function updateLatest() {
  if (!checkPwd()) return;
  setAllDisabled(true);
  setStatus('🔄 拎緊當前 GW...', '');
  try {
    const boot = await fetchFPL('bootstrap-static/');
    let gw = 0;
    boot.events.forEach(e => { if (e.is_current) gw = e.id; });
    if (!gw) boot.events.forEach(e => { if (e.finished && e.id > gw) gw = e.id; });
    if (!gw) { setStatus('❌ 搵唔到當前 GW', 'err'); setAllDisabled(false); return; }
    await runUpdate(gw);
    setStatus(`✅ GW${gw} 完成！`, 'ok');
  } catch(e) { setStatus('❌ ' + e.message, 'err'); }
  setAllDisabled(false);
}

async function batchUpdate() {
  if (!checkPwd()) return;
  const from = parseInt(document.getElementById('batch-from').value);
  const to = parseInt(document.getElementById('batch-to').value);
  if (!from || !to || from > to) { setStatus('❌ GW 範圍無效', 'err'); return; }
  if (to - from >= 8) { setStatus('❌ 每次最多 8 個 GW', 'err'); return; }
  setAllDisabled(true);
  for (let gw = from; gw <= to; gw++) {
    setStatus(`⏳ GW${gw}...（${gw-from+1}/${to-from+1}）`, '');
    try { await runUpdate(gw); }
    catch(e) { setStatus(`❌ GW${gw} 出錯：${e.message}`, 'err'); }
    await new Promise(r => setTimeout(r, 1000));
  }
  setStatus(`✅ GW${from}–${to} 完成！`, 'ok');
  setAllDisabled(false);
}

async function runUpdate(gw) {
  const [h2hRes, bootRes, liveRes, fixtureRes] = await Promise.all([
    fetchFPL(`leagues-h2h-matches/league/${LEAGUE_ID}/?event=${gw}`),
    fetchFPL('bootstrap-static/'),
    fetchFPL(`event/${gw}/live/`),
    fetchFPL(`fixtures/?event=${gw}`)
  ]);

  const netByEntry = {};
  (h2hRes.results || []).forEach(m => {
    netByEntry[m.entry_1_entry] = m.entry_1_points;
    netByEntry[m.entry_2_entry] = m.entry_2_points;
  });

  const elementName = {}, elementTeam = {};
  (bootRes.elements || []).forEach(el => { elementName[el.id] = el.web_name; elementTeam[el.id] = el.team; });

  const liveData = {};
  (liveRes.elements || []).forEach(e => {
    liveData[e.id] = { points: (e.stats && e.stats.total_points) || 0, minutes: (e.stats && e.stats.minutes) || 0 };
  });

  const now = new Date();
  const teamStatus = {};
  (fixtureRes || []).forEach(f => {
    if (!f.kickoff_time) return;
    const mins = (now - new Date(f.kickoff_time)) / 60000;
    const s = { kickedOff: mins >= 20, finished: f.finished || false };
    teamStatus[f.team_h] = s; teamStatus[f.team_a] = s;
  });

  const players = Object.keys(PLAYER_MAP);
  const picksData = await Promise.all(players.map(async name => {
    try { return { name, entryId: PLAYER_MAP[name], data: await fetchFPL(`entry/${PLAYER_MAP[name]}/event/${gw}/picks/`) }; }
    catch(e) { return { name, entryId: PLAYER_MAP[name], data: null }; }
  }));

  const grossByEntry = {}, capElByEntry = {}, vcElByEntry = {}, rawChipByEntry = {};
  picksData.forEach(({ entryId, data }) => {
    if (!data || !data.entry_history) return;
    const net = netByEntry[entryId];
    if (typeof net === 'number') grossByEntry[entryId] = net + (data.entry_history.event_transfers_cost || 0);
    const cap = (data.picks || []).find(p => p.is_captain);
    const vc = (data.picks || []).find(p => p.is_vice_captain);
    if (cap) capElByEntry[entryId] = cap.element;
    if (vc) vcElByEntry[entryId] = vc.element;
    rawChipByEntry[entryId] = data.active_chip || '';
  });

  const grossArr = Object.values(grossByEntry).filter(v => typeof v === 'number');
  const minGross = grossArr.length ? Math.min(...grossArr) : -1;

  const prevResults = await supabaseGet('weekly_results', `?gw=eq.${gw - 1}`);
  const prevByEntry = {};
  if (Array.isArray(prevResults)) prevResults.forEach(r => { prevByEntry[r.entry_id] = r; });

  const weeklyRows = [], capRows = [];
  for (const { name, entryId } of picksData) {
    const gross = grossByEntry[entryId], net = netByEntry[entryId];
    if (typeof gross !== 'number' || typeof net !== 'number') continue;
    const lp = (gross < 45 ? -20 : 0) + (gross === minGross ? -20 : 0);
    const h2hp = calcH2H(h2hRes.results || [], entryId);
    const prev = prevByEntry[entryId];
    weeklyRows.push({
      gw, player_name: name, entry_id: entryId,
      gross_points: gross, net_points: net,
      league_penalty: lp, h2h_penalty: h2hp,
      total_penalty: lp + h2hp,
      cumul_penalty: (prev ? prev.cumul_penalty : 0) + lp + h2hp,
      cumul_net_points: (prev ? prev.cumul_net_points : 0) + net,
      updated_at: new Date().toISOString()
    });

    const capEl = capElByEntry[entryId], vcEl = vcElByEntry[entryId];
    const rawChip = rawChipByEntry[entryId] || '';
    if (capEl) {
      const isTC = CHIP_TC_KEYS.includes(rawChip);
      let effEl = capEl, usedVC = false;
      if (!isTC) {
        const capMins = (liveData[capEl] && liveData[capEl].minutes) || 0;
        const st = teamStatus[elementTeam[capEl]] || {};
        if (capMins === 0 && st.kickedOff && vcEl) { effEl = vcEl; usedVC = true; }
      }
      const rawPts = (liveData[effEl] && liveData[effEl].points) || 0;
      capRows.push({
        gw, player_name: name, entry_id: entryId,
        captain: (elementName[effEl] || effEl) + (usedVC ? ' (VC)' : ''),
        captain_pts: rawPts * (isTC ? 3 : 2),
        cap_ok: rawPts >= 4 ? 1 : 0,
        chip: rawChip, updated_at: new Date().toISOString()
      });
    }
  }

  await supabaseUpsert('weekly_results', weeklyRows);
  await supabaseUpsert('cap_log', capRows);
  await loadData();
}

function calcH2H(matches, entryId) {
  for (const m of matches) {
    if (m.entry_1_entry === entryId) return m.entry_1_points < m.entry_2_points ? -20 : 0;
    if (m.entry_2_entry === entryId) return m.entry_2_points < m.entry_1_points ? -20 : 0;
  }
  return 0;
}

function setStatus(msg, type) {
  const el = document.getElementById('admin-status');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}

loadData();
</script>
</body>
</html>
